body:
  text: 元盧琦撰賦驅睡魔賦盧子好讀書每閲一卷輒欠伸思睡盧子曰是必有魔我者乃為賦驅之千里之外其辭曰古之君子自强不息宰予晝寢仲尼斯責允也神禹寸陰是惜展矣周公夜以繼日萬世而下咸仰盛徳後乎諸賢亦殫厥力董兮下帷衡乎鑿壁各有令名著于簡冊肆予之學作輟靡一厥咎在汝莫能汝克方其茅齋寂寂晝長如年烟生古篆風入新絃爾或至止孝先欲眠䆋堂凄凄夜寒如水銅壺促更鐵檠繼晷爾或至止希夷好睡至若佳客滿座載笑載談爾或窘我我舌以緘明師正席講道窮理爾或窘我我心以弛雪案螢牕手不停披擷詩之葩採禮之儀掲書之要搜易之微爾或病我力倦神疲吟誦之餘才思攸攄歌亞靈均賦凌相如詩驚李杜文駕歐蘇爾或病我詞澁興枯爾來無聲爾去無跡窺之莫見捉之莫獲今予將以仁為矢以勇為弧以志為將帥以氣為卒徒扞吾禮門用屏爾居障吾義路用塞爾塗爾宜遁跡於無人之濵竄身於不毛之區毋入我廬毋邇我軀詩不云乎其虚其邪既亟只且子將如何言猶未既恍惚之間若夢若醒有若答我曰噫嘻子言過矣豪家甲第待予孔敦美褥疊綉華衾耀文垂珠簾以掩晝設翠幙而扃春仙翁野衲接予益勤竹牕納月柴闗閉雲席樹陰以終日對柏子之清芬彼屢得我而不以為厭我數訪彼而不以為煩故日與遊陽臺之雲雨步華胥之乾坤臨謝池以覔句詣槐國而游魂奚獨見斥於夫子而使我不能自存也耶予曰富貴者何事乎勤學隱逸者何心於功名予也進不少攄其志退不得獨善其身是以汲汲孜孜靡遑底寧期努力以弗怠或庶幾而有成子宜亟行我非少恩睡魔於是砉歘嚘咿逡巡畏縮電走風馳一往不復悠然亭賦蘇子瞻説陶詩云本自採菊而舉頭見山悠然忘情趣閒而景逺可謂深得此詩之旨矣然此老自彭澤去官歸不為世故所縛隨所寓輒悠然非特採菊見山之詩而已靖山蔣君慕靖節之風而以靖山為號取採菊之句而以悠然名亭其趣向從可知矣予因為之賦以擬君之趣賦曰驛溪之山層層驛溪之水泠泠有隱君子俯溪而亭牕八面兮玲瓏屋數椽兮丹青景無禁而可取門雖設而不扃儉不及陋奢不及侈而扁以悠然之名主人無事日遊于亭曰昔義熙哲人解組來歸神契靈均節凌伯夷念夙世之所慕冀往躅之能追忽舞蹈以有得乃援琴而歌之歌曰若有人兮山之下步東籬兮容與紛春妍兮何之撫秋香兮遲遲暮秋香兮娛人立西風兮誰晤又歌曰若有人兮山之麓步東籬兮彳亍日將夕兮忘歸采芳馨兮盈匊盈匊兮遺誰羌好修兮公所獨又歌曰若有人兮山之陰樽有酒兮牀有琴撫琴兮無絃釃酒兮屢斟何千載兮寥寥羌獨㑹兮余心歌闋于時有客坐於亭上聞歌而悟攬衣而起曰大化一漚浮世萬殊事有共途而異域人有異世而同趍維先生之所尚與靖節兮相符至若灝氣横空荷枯栁敗盻芳藂之始華傲晚節而獨在方離披以向榮聿璀璨而可愛幽馥散乎庭户雅韻凌乎蕙窗登斯亭也覽斯物也其靖節之所采者歟連峯相繆一碧葱蒨既列屏以競秀亦排闥而自獻嵐光凝而暮寒木葉下而秋逺雲出岫以來歸鳥投林而已倦登斯亭也對斯景也其靖節之所見者歟維亭之下鑿苔而池分數畝之靜幽開一鑑之漣漪導泉流之縈迴泛瓦影之參差亭亭者華不蔓不枝圉圉者鱗躍波而嬉於此而嘯咏何異乎臨清流之賦詩維亭之側瀕池而圃恍惚乎三逕依稀乎五畝夕延竹外之月朝拂花間之露時摘我蔬時種我樹清陰在觴佳色在屨於此而逍遙何異乎涉南園以成趣綸巾翩翩羽扇載揚薰風南來衾枕晝長似卧北窻夢寢羲皇佳賔既至歡伯在席留連投轄談笑岸幘似遊廬阜偃仰醉石左圖右史前經後傳秩然插架可味可翫爾遺埃壒身謝軒冕澹然閒情孰羈孰絆似乎歌歸來之詞以遊下潠之館嗟卷舒有時顯晦惟遇釋莘野之耒而澤民投渭川之竿而佐主墅平泉者秉國之鈞堂緑野者中興之輔今也四海為家萬國車書吾子將為鳴陽之鳳乎抑將為空谷之駒乎將為在林之鶴乎抑將為泛水之鳬乎主人笑而謝曰北山有移文之誚終南貽捷徑之譏謹我優游勉我遁思夜鶴不可使之蕙怨曉猿不可使之林悲言畢但見空山寂寥涼飆颯爽四簷露冷雙溪月漲付物我於兩忘夫奚有乎得喪又安知夫蔣之為陶而陶之復為蔣也耶海賦海於天地間為物最鉅旋斡乾樞包括坤㝢思昔洪水懐襄帝命神禹乗四載以焦勞決百川而東注屯余車於龍門率飄風而來御天吳紛兮乗旗罔象導夫先路湠漫瀰渺茫無涯溆浚壑谷以納衆流指西極而回顧於是地軸載安端倪呈露波涵太清雲興風起東接扶桑西逾弱水北洗沃墟南瀲珠厓珠厓之外不知其幾萬里浴陽烏於東津没望舒於西澨蜃樓市於空中鮫人織於水底馬銜開口以雄吞海童邀路而瞪視其神怪有如此者其鱗則巨魚突兀高濤浮游六鼇負山大鯨吞舟揚波之鬐插雲之鱗固莫名狀何數乎魚蝦螺蚌鱨鰋魦鰡其羽則鯤鵬變化扶搖九萬鬐鬛蔽雲羽翼凌漢鶢鶋避魯門之風精衛沿發鳩之岸詭色殊音羣飛類浴徜徉乎波瀾沙石之岑渤澥之島又何計乎雙鳬乗雁其寳則陽氷以濯陰火潛嘘赤鱗紫貝詭石文渠蛟室之所儲又何止乎鼇山之貝蚌殻之珠予方觀瀾作賦染筆濡墨客有笑于傍曰子所言者海之迹請為子言海之澤廣大無涯流行不息葢納百川而不泄者海之量載萬斛而不重者海之力潤下作鹹者海之性卑以自居者海之徳舟楫以濟不通者是其仁潮汐往來旦暮者是其信與天地以長存歴萬古如一日此海之所以為大也子之言固未究其萬一予聞客言有靦其顔上手稱謝探本知源客喜而笑巘同觀達大觀以逺眺步徙倚以盤桓踸𤣥虚之故步感軻氏之難言記重建登科巖記惠安縣西一里有巖曰登科稽之邑志始名登高山宋乾道間邑人盧瞻讀書其上以八行舉因改名焉是山有林麓泉石之勝諸峯環峙萬象在下大海際天一望無極每佳辰良月邦人士女咸兹以嬉崇浮圖者因為之殿宋季燬焉延佑甲寅邑之好事者乃宇其故址修葺未完歳深且壊至元丙戌前進士雷侯子樞來宰是邑去煩除苛興廢舉墜易法律而仁義化呻吟而嘯歌視政之暇訪求幽曠以資遊觀得兹山喜曰是何其名之嘉也且相距咫尺寧憚勞乎迺率僚屬登焉至則慨昔賢藏修之地鞠為草莽為之惻然者乆之越三歳戊子冬十月計工度材令白莎寺主僧嗣証董其役吏陳振王君爵給其需芟夷孔艱墾闢寖廣既葺前殿之壊復作後殿屬之高明爽愷雅與山稱翼以兩廡表以山門又與殿稱官弗匱助民弗匱力己丑春二月落成稚耋聚觀咸謂規制之盛前此所未有也於是雪溪林先生走書鐔津之上屬予為記其言曰子邑士也於盧公為裔孫而又獲與雷侯同舉子為文志兹役庶幾揚乃祖之美昭令尹之功俾與兹山相與無窮不亦韙與余惟自有天地即有兹山閲千萬年至于吾祖而佳名始著自吾祖以來又幾百年至于雷侯而舊觀一新地不自顯因人而顯亦其數然也余以升斗縻兹不能去他日歸鄉里攜朋儕相與杖屨其間當爰筆賦之雷侯名機字子樞以延平府推調是官所在咸有治績長子燧次子燦俱領鄉薦重修永春縣學記泉郡之西百二十里置永春縣治縣之西五里置學稽之邑乗學舊在縣東宋大觀迄紹興凡再遷而後定元至正十二年壬辰春三月予始蒞縣事即謁學教諭高仲舉等進而言曰是學自至元内附以來前後累改然歳乆屋老隨葺隨壊宜更乆之顧學租薄猶不足以供祭祀瞻師生如營繕何予喟然嘆曰彼釋老之宫布滿天下在在華麗今天朝右文而聖人之居其陋若是吾徒得無赧乎矧余來方欲以教化理諸邑而學又教化所自出尚得辭其責乎於是邑之好義者若陳惟孝等相與謀曰令方有事于學吾黨當叶力相之以速于成無何而粟盈于倉楮羨于帑矣是年夏六月首作㦸門五高與殿稱距㦸門四丈有竒建櫺星門以臨通衢與㦸門稱㦸門之左為小屋右為亭因故址而加崇焉亭舊名思樂令易而匾之曰光霽遂及明倫堂暨左右四齋柱之腐者易之棟之橈者更之俾可以乆堂之東西各有庫西以經史而學官私居鄰焉東以藏祭器而魁星祠密邇焉堂之前搆儀門與兩廡接為門如㦸門之數儀門之内鑿地為池甃石以瀦水而橋其上環以欄楯仍繪先聖及從祀像而華其殿由殿而廡而門悉加丹堊十四年甲午夏五月安溪縣冦作六月侵我疆官署民户燬于火而是宫巋然獨存既而義旅聚於斯栖兵于齋飼馬于亭穴垣而蹊斧户而爨所不克毁者僅廟余與戈甲相卧起弗暇顧也十五年春三月冦平民獲休息乃復召工補頽㦸門之外砌石為亭而種樹于其側櫺星之外築牆二十丈障其前闢官道而廣之徙興元省賢二坊于道之左右而相望焉葢至是而役告畢矣又以士之無養也復勸陳光輔等捨田若干以廩之以祭器之未具也復範簠簋籩豆以用秋八月上丁克如禮禮闋宴于堂上羣賢具在教諭顔寧助等請曰某等重役于兹與執事相周旋殆將四載中更禍患尚賴先聖在天之靈獲就緒矣今日釋干戈而爼豆捨甲胄而衣冠雍容揖遜于禮樂之地顧非幸與願記之以示來者余聞之學所以明人倫也夫人倫有五而君臣為五倫之一所係為尤重聖人教人為學亦不過明此而已永春承平日乆民不習鬬冦始乗其無備而掠之邑大夫士且忿而起慨然興義兵為國家出死力其細民亦往往用命於鋒鏑之下而不暇顧其身以攻則克以守則固冦分道闖吾境大小三十餘戰而竟不能入尺寸葢民心惟君臣上下之分不可一日廢故其臨危捨命有不待勉而為之者豈非平昔服習聖人之教而然哉然則學校之設其有功于世大矣今百里寧謐吾與君等得相安於無事其可忘所自耶諸君子第以營繕之顛末求余文而不知余之記殆有重於此者輪奐云乎哉衆咸曰然遂書記永春縣重建公署記縣𨽻泉郡七獨永春山水之秀視它縣為最以誌攷之是地為桃林場晉天福間始陞為縣縣治背大羽而面像山下臨溪水陰陽家以為最勝者也公署重建於至正元年辛巳時監縣鎮奴尹方建翁典幕黄真仲也十四年甲午夏六月燬於鄰冦冦恣摽掠所在焚蕩予與義士吕用賔父子僚友伊守禮暨諸慕義者大募民兵擊之屢戰屢克十五年乙未春三月冦平官曹即他所理公事民復業者往往依村落以居市井蕭如過者嘆息是年耆老數十人踵門告曰公署所理民望所屬也乆廢可乎且自君失之自君復之不亦善乎予喟然嘆曰事有廢興是固當為然民病未甦恐未可為今旦夕當代恐不及為父老請弗置遂許之於是富者輸財貧者輸力九月興功木石陶冶之匠各執其技命邑士顔希道督之乃作㕔事後堂摠為間十㕔事之西為江黄二公祠東為幕所翼之以吏舍表為儀門堂故卑濕爰積土而増崇之前為亭後為軒左右為房凡深淺廣狹之制陰陽向背之宜一仍其舊而高明稍勝人咸謂其規模之偉也時縣尉趙居仁陳岩寨巡檢方純亦各以其所宇來白余念其役不可輟因以邑民所輸力者分給之居無何而尉司之署亦成矣衆復以樵樓為請乃併作之㑹未就緒而余改調福之寧徳矣他若犴獄倉庫庖厨之屬凡所宜葺者不暇葺而去葢十六年丙申冬十月也嗚呼予作邑垂五載方其始至天下承平境内無虞日與士民共享優游暇豫之福安知邑冦之禍若是然乎拊摩於瘡痍之際營繕於煨燼之餘錢弊法舛工傭費巨安知今日之事庶其苟完乎余既不能固守封疆貽我民荼毒復勞我民以就兹大役寧不重得罪於我民乎嗚呼其亦艱哉抑亦不得已而為之也與我同志圖惟厥終則匪予之幸斯民之幸也故書此以識歳月而尤不能無望於將來云爾三華重修講堂記至正九年己丑六月余以事抵三華即謁廟學偕諸儒坐於講堂之上顧瞻棟宇欲壓因謁教諭商君季友曰學以明倫也堂以講學也可若是壊耶盍圖之起而曰僕備員于兹興頽補弊之務恒寘于心欲獨任諸已則廩如懸罄欲旁托諸衆雖家至户諭言未易售固將待其人而後興與且是學之經營顛末具載于碑始終皆吳氏之功也廣徳二守武畧公實作之其後寢壊則畧之子臨漳二守遜齋公修之又其後正殿兩廡暨櫺星門壊遜齋之子今汀州二守松泉公重修之松泉於學尤究心旦夕代歸斯堂之新可卜矣明年庚寅夏五月季友走書延平諗予曰比者松泉公歸自汀僕輙以向之復于執事者請公欣然曰是吾責也是吾父吾祖之志也於是捐財集工不俟終日凡棟樑榱桷竹瓦之汚腐殘缺者悉易之完緻視昔加倍丹堊漆髹煥人耳目興役於己丑六月畢工於庚寅三月縻鈔為錠八十有竒而它人無與焉學之人士僉謂吳氏有功於學三世矣宜載其事于石俾來者考焉執事幸為記之余惟學乃教化所自出之地其事似緩而實急自夫二氏死生禍福之説勝天下無賢愚貧賤咸靡然趨之求其用力於教化所自出之地則亦寡矣吳侯獨以高明特達之見崇正學而不惑其諸異乎代之人歟且人孰無子孫焉然不能保其皆賢而無不肖作於前而述於後者幾何人哉吳侯乃能以其祖父之心為心俾鄉校之士藏焉脩焉遊焉息焉其必知所自矣雖然堂之設豈止於是而已固將相與講明古昔聖賢誠意正心齊家治國平天下之道窮而推其説以淑于鄉達則充其用以濟于時斯無負吳侯所以作新斯堂之美意侯名克忠松泉其號也教諭名皓三山人東坡善應庵記至正二十一年辛丑予抵福清平南之東坡至于善應庵一日僧覺真暨優婆塞陳覺榮來諗曰是庵創於大徳己丑至元戊寅乃重建焉其事則陳何二師之經營其教則東林遺法也二師去世乆而事實未有紀恐遂湮没無以示來者敢請予曰第言之我為若記之極西之方有淨土焉其國無三惡八難其人大樂有能念佛三昧往生彼界晉時盧山逺法師懼夫代之信者弗篤作為咏歌以勸之由是東林有白蓮社當時化焉故庵宇比比有之而此以善應名葢取觀音經中善應諸方所語也又曰庵故陳覺堅宅也覺堅年甫壯輙脩淨業嘗建安福庵後灣厥有成規乃出謁道師之有軌行者以究其道既歸思别度法宇謂莫東坡若也遂以宅為之而居其族於旁里不以混焉乃拓厥基欲其舒也乃凹厥壤欲其燠也首作佛殿次作觀音閣後灣陳覺正實相成之於是覺堅老矣其徒陳覺慶道行愿謹為時所推自嗣以來内潰私蓄外資衆施務新厥故用𢎞兹庸既鳩工視中殿曰狹矣其廣之乎視觀音閣曰陋矣其易之以高明乎視棟楹榱桷曰腐撓矣其悉更之既克有成咸就矩矱施之金碧被之漆髹殿之後闢軒東向累土為層臺而墉以衛之閣之下闢軒南向列其房於左右外則旁取篁篠花卉之屬雜植焉涅槃有堂香積有厨寢有次食有所殘繕苟完即以其餘市田若干畝課僮種藝而取其入以食葢覺慶主之而覺真覺榮與北山林某咸有力焉予䎹而復曰釋氏以人天小果目締搆然以崇象教匪是曷依是庵也有覺堅基厥始有覺慶圖厥終若二人者殫精神竭志慮以輔翼之卒克就緒兹惟艱哉雖然非以眩美觀也其惟𢎞爾佛之教以惠斯人乎夫佛之道其教不過導人為善已耳雖蚩蚩者流幽明之五濁仇之十纒九腦囚之罔覺罔脩誰愆誰尤然而性固善也導之善善斯應矣又奚他之求及其至也可行其道諸惡不留其羣聖之儔與今夫海島荒遐之處戒葷血人念三昧誓超惡趣期生淨域豈其俗固然哉教所被也然則兹庵之作其利益不既多乎若夫究真諦於一言之頃悟奥義於一事之微學者殆未易進此然頓由漸入尚勉諸覺真覺榮曰然遂書以授之而鋟諸梓覺真號東庵覺堅之孫覺榮號桂堂覺慶弟子其戒行顯著里之人尤加重云惠安縣學修學増田記至正五年己酉夏六月惠安教諭傅君馳書告琦曰惠安學凡四遷而迄定於縣治之左前至元癸巳令尹趙君仲臣之所創也舍如舟廩如罄倚教席者視學如傳間有以革陋為志往往畫於力不足以叩有司有司聽之漠然不少加意如是者積有日矣至順庚午監縣樂禮公實來毅然以興學自任宫之狹者闢而廣田之失者稽而復士為建祠樹碑徳之也又十有二年辛巳吳漢臣來守兹邑飾大成殿殿廣袤凡若干悉易磚以石又三年甲申陸公若華繼至乃大脩明倫堂棟撓者更之礎陷者平之枲桷瓦甓無纎巨咸徹其舊腐破缺而新之堂之後曰尊經閣閣之下曰崇賢堂畢就輪奐更築環圃之牆為丈六十有竒徙光霽亭其中仍斥而大之又自櫺星門達於通衢翼以石欄為問凡四十有六自始役迄終公每躬督之不務苟成不求速効必完必固圖可以乆於是學之制始備先時邑民陳某以罪没田于官鄉豪陰據之前令吳公廉得其狀議以所没田與學養士牘具即代去豪賄吏陰更其牘公亟以前議白之府府是之因召豪至廷下示以法豪遂服田悉歸於學於是學廩始給邑之耆士來言曰凡有功於學者宜祀今仲臣樂禮公既有祠公與前尹吳公獨不宜祠乎衆諾而祠之將載其事於石因以所入田附書焉請予為記某聞諸邑令古諸侯也邑學古庠序也董子曰設庠序以化於邑夫興學以化於邑者令之事也邑得良令難前有作而後克繼之者尤難若二公者其位同其志同其興學之功又同即於學而並祠之者葢秉彞好徳之良心其施於二公者亦同也某邑諸生也目當時之陋每羞且憾之今者居有廬食有廩絃誦有次其可忘所自耶為我語同志之士其益勗乃徳淬乃業處而善其身出而周於用庶幾不負二公教養之初志云是為記遊菱溪記惠安之北鄉其泉石林麓之美獨菱溪為最勝溪之上兩峯對峙蒼翠可愛崔嵬嵽嵲狀若相敵而不相讓者一水出兩峯間或淵潫黝黑莫測其底淺僅没膝瑩徹淨幽魚之往來可數也溪多石水觸之則滂湃有聲其最巨者離列水中相距咫尺水東而過過則帖然凡幾屈折出而抵於驛道之衝宋治平中橋之以渡即所謂永濟橋者水由橋下徑注有山横截其流水復曲行疾逝自此以往予亦未暇究其所窮也曩余來訪親舊愛溪之勝而屢遊之然信宿則去不能留也至元己亥初夏予與莆陽人方君同寓烏石精舍溪出烏石山之背每日未晡主人輒相命以出出則之菱溪至則上汾下流以釣得魚以歸歸則月出東山矣故夕率一至焉雖風雨亦往然猶以為未極其趣也五月末澣不雨不暘主人野服芒履客亦如之一僮釣竿以從一僮肩酒雜以肴䔩始由永濟橋側披榛取道以達溪主人把釣立於翠蔓青樹之外倦則與客列坐石上命酒少酌酌罷則釣如故頃之步且前石愈竒水愈清地愈奥意愈適而魚之嗜餌者亦數數獲之於是爽氣憑陵煩襟瀟灑雖屢酌不醉也已而復得石橋數間盤桓乆之遡此而上計當猶有佳處而日入矣噫主人生於斯且將老於斯余與方皆客也山色水光不可奪取分而去也雖欲常賞諸勝其可得乎昔栁子遭事謫南州乆且不復其最勝者若黄溪鈷鉧潭諸處無所不遊遊輒為之記所謂雄深雅健之文皆以是得之今余才不見用於時文不足示於後姑書以誌歳月云耳誌銘祭文元故真士陳公墓誌銘至正十三年癸巳二月二十二日有元真士惠安陳公卒於烏石之正寢得年五十有八卒之十日其侄女偦盧琦在永春聞而哭之又十日其從子從仁走書於琦曰先叔父向有疾嘗為文囑其子同曰吾平生慕古道今老且病倘不起喪事一依古禮慎毋用二氏非親知不受弔踰月而葬題云有元真士烏石陳公之墓足矣兹不幸没同悉從治命將以是年四月二十四日辛酉葬於林坑山之原惟先叔父夙遇執事厚知叔父之詳莫執事若其銘以來庶有以慰死者於地下琦得書泣曰嗚呼生我者父母知我者真士今我戀兹升斗不可去真士病不及問斂不及視葬不及㑹吾負真士多矣嗚呼尚忍銘之哉真士諱士麟字子信元真丙申二月二十日生曽祖諱元善祖諱嗣源父諱旃澤母黄氏真士早失怙恃事二兄惟謹性嗜學諸史百子靡不遍閲手未嘗一日釋卷凡古今人物事變往往能道其詳雖老師宿傅弗逮也治家有法教子有方待姻戚舊故有禮恤下有恩動輒取則古人每誦諸葛武侯吾心如秤不能為人作輕重之言以自儆視習俗姦偽戚然若有所不堪者所居山水明秀即居之東偏為亭有池臺華卉之翫命酒酌客殆無虚日或適意漁獵放浪藪澤間與勢利邈不相接葢有所悟矣娶莊氏先殁再娶王氏有淑徳生男一即同也生女五長適葉次適連次許適栁末許適王琦往來外館今三十年真士念之如一日去載繇永春入仙遊捕冦取道惠安還邑真士語留信宿别時無他祝惟曰若先人教若廉謹守道事載家乗幸念之勿廢嗚呼真士已矣寧復聞斯言哉銘曰樸以葆真曰唯古人遯以養晦曰唯真士佳城言言真士之墳菱溪可竭刻文不滅樂齋陳公墓誌銘予穉歳聞先子前村公及舅氏豐山公每言夙昔遊浮休先生之門同舍凡數十人而樂齋陳公尤表表時予雖耳公之名未及見也一日駕舟至樂島始見公眉目娟秀意度閑雅有古君子之風焉自公肥遯於家予每歳游學他郡不可得而復見及予歸自京師公以詩來賀暨舅氏屬和聮篇今纔十餘年先子殁先舅氏殁公亦殁歳月流邁諸老淪落可勝悲哉公諱立功字連仲號樂齋處士以至元己亥九月二十五日生乃後唐金紫公光禄大夫諱政字雍之仍孫其先自江州義門入閩居惠安之南浦扶陽迨宋户曹諱南鄉者捨宅為院遂遷於樂島居海上内有林麓之美秀氣恒鍾乎人故陳以明經顯者相繼有曰遇平者終鬱林知州有曰遇鳳者終新州新安知縣公大父諱季卿宋宣教郎父諱慶祖收節郎興泉巡使母劉氏公少敏達惠安尹子俊趙公竒其才薦為泉郡庠直學公勉職已而嘆曰親在吾安能逐聲利於外而廢甘㫖養哉即杜門不出事巡使公及劉氏以孝聞睦族善鄰教子待賔與凡所應接者各盡其道每慕少游之為人常曰騎馬乗車優游鄉里得善人之稱足矣此外復奚求哉晚年喜溪山之勝遂卜居於仙邑之龍水即居旁為小屋匾曰樂齋固其號也一夕謂諸子曰吾老且死汝亟為我買舟吾當涉海適故鄉與族里父老相聚而别是吾志也即往造焉將返時公從弟諱至明者年七十餘以詩賀公曰福縁善積見曽孫金玉團欒聚一門白髪弟兄何忍别勉君終老聚陳村公讀之泣曰吾豈恝然忘情哉苐死在旦夕且卜葬仙溪有年矣安能乆處此也因依韻答之曰重來海上撫諸孫桑梓森森影在門老去豈無懐土念新丘已卜水邊村遂返龍水信宿而殁時至正辛卯十二月二十日也得年七十又七公娶劉氏林氏宋氏皆先卒林氏宋氏已葬劉氏生男英娶林氏女某適莆陽萬俱夭林氏生男渼娶鄭氏宋氏生男三沃娶卓氏澚娶林氏演娶黄氏孫男三人孫女五人曽孫男女三人劉氏生於甲寅七月四日殁於戊寅八月十六日得年五十又一諸子卜以某年某月某日奉公柩及劉氏葬於仙邑連江里某山之原從治命也余試邑山中時艱事劇弗獲奔走數百里以弔公之墓姑即行實而銘之銘曰海上山峙隱士攸止學積於躬孝形千里有屋有田貽厥孫子晚圖乃居于彼龍水扁舟涉江撫其姻戚姻戚孔偕一别而死佳城言言仙溪之涘我是用銘昭示來裔祭烏石陳貞士文維至正十有三年歳次癸巳四月戊戌朔越二十又二日己未侄女偦盧琦謹以牲酒祭于故妻叔貞士陳公之靈告以文曰嗚呼茫茫宇内孰不有生貞淳伊邈巧偽相乗公有至性百慮一誠人生百歳孰不有死悉崇佛老以畢喪事公有遺命爰却二氏其生也順其死也安生死罔愧今人所難烏石之陽菱溪之北不事奔競以遊以息胸中萬卷古今歴歴揮麈清談聽者無斁種稻盈郊樹桑環宅市書課兒釀酒延客杖屨往來東阡西陌或漁或獵隨意所適我陳氏偦數登公門公其念我情義孔敦留或旬餘語或夜分論經講史聞所未聞及我出仕屢辱誨言懼其惰荒戒以廉勤尚期暮年保厥貞固豈料一疾而斃之遽佳城伊邇輀車載舉願言執紼道修且阻瞻望弗及雙淚如雨啓青詞上惠安吳縣尹啓郎官出宰百里載綰銅章書生窮經十年尚磨鐵硯不圖今日獲立下風恭惟某官剛方有守温粹無瑕文章可以名家才畧可以經國宜大展於驥足乃小試於牛刀金浦栽花邊地播去思之頌錦鄉衣綉小邑誇創見之榮睠此龍山控兹驛道自昔號煩劇之所至今為彫瘵之區鮒轍之厄未蘇鳬舄之來何暮以明敏涖事案無滯牘獄無滯囚以禮讓化民畊則讓畔行則讓路膏澤源源於乆旱之際紀綱井井於積弊之餘仁已洽於一方政每形於三異丕績擬河南之治夫奚以加清徳照石門之泉終當不易况庇士之慶最大而延賢之席尚温自顧艸茅獨淹蓬蓽抱和氏璞屢遭刖足之刑鼓伯牙琴尚冀知音之賞倘葑菲無遺於下體獲桃李盡在於公門答吳縣尹啟叩閽依日月叨蒙聖主之恩下筆生雲烟聿拜長官之貺捫心自愧揣分奚堪竊謂士之際遇有其時道之廢興係乎數自大元天下之定於一將及百年由甲寅科舉以暨於今已踰兩紀何列郡人才之輩出獨吾泉風氣之未開厲賢宰之作成致鄙儒之振拔如某者疎庸無似困踣半生佔畢徒勞莫了一經之債㫖甘弗繼敢希三釡之榮束書逺赴玉京唱甲猥塵金榜歐生閩中貢士豈期韓愈之同科賈氏洛陽少年葢得吳公之一薦方圖造謝遽辱寵嘉觀禮孔庭俾綴衣冠之末肆筵偃室叨居樽爼之間在吾道以有光諒輿情之胥悦兹葢伏遇某官聲譽藉甚詞藻燁然里巷喧謳歌之音門庭杜苞苴之謁撫窮扶弱民有父母之可依摘伏發奸人謂神明之罔測政績最於他邑文化洽於泮宫遂令下材式歸洪造知己之恩特厚寒微其何以報公理民之術尚疎高明必有以教我領舉贄上本路鄒總管太守民之師帥首唱文風儒生賔於王家適逢景運遥瞻列㦸爰進鄙辭恭惟某官性地如麟趾之仁世胄有鳳毛之貴二十年戀闕帝曰汝其臣鄰一萬里分符民謂家有父母挹紫帽清源之雄麗擁朱轓皁葢之光華明足以察吏奸寛足以蘇民瘼處處服龔黄之化賣刀劍而務農桑家家誦孔孟之書賤珠琛而貴道徳課兒之燈不夜延師之席常春某自顧艸茅乆淹蓬蓽家貧親老未遂禄養之初心日暮途窮復睹賔興之盛制偶獲鄉闈之捷將為京國之行禹門變化之神當自拔於聖代鄒管吹嘘之力尤有賴於明公分司海口場祈晴伏以官有常職惟煮海之為勞民不聊生爰籲天而有請仰干鴻造俯瀝蟻忱伏念某叨貳漕司忝理經費朝廷責任之重負荷弗堪省府號令之嚴譴讓輒至事或因而或革心且恐而且憂比者領職途中兹焉分治海口歳辦一萬引之上額數頗多時當八九月之間工程猶少老㓜登程而就役僚屬隨地以分催土汛當收而連朝霖雨不止火伏已迫而列竈烟焰暫停雖云人力之未周實則天心之莫測葢由涖政不謹每傷陰陽之和故自興煎以來屢被風雨之患勢豈容緩計將曷施顧微臣無尺寸之能安所逃罪念下民有鞭笞之苦誠不忍言乃命羽流肅陳清醮竭精誠而控告祈隂翳之開明上憂國下憂民非為己禱外滌身内滌慮惟求天知乞賜兩月之晴甘捐十年之算伏願上帝如在羣后若臨金輪吐耀於山川日日慰輿情之望玉屑奏功於鼎鼐人人慶邦課之登雜著建言常平切聞政所以養乎民惟善則可守法不必泥乎古有弊則當更伏覩至正七年詔書内一欵言路通塞治道所闗内外大小衙門官員凡朝廷軍民利病直言無隱卑職承奉使司劄使前往延建四路㸃視常平倉已行遍歴㸃視外切縁常平之役昔戴胄耿夀昌之徒實建明之豐年増價而糴歉年減價而糶葢有成周救荒之遺意焉國家舉而行之誠良法也然近年以來但見其害而不見其利葢法立弊生以至於此顧今日講究方新推行甚力而鮿生乃欲冒陳其弊不幾於躁妄乎然其弊不知則已既知其弊而姑付之緘黙恐非明詔究利病極言無隱之意也故敢以足跡之所至耳目之所逮者言之其弊有八省府明文豐年收糶本分派鄉都為里首者陰符吏弊云某人當領鈔若干某户當納穀若干吏輩從而漁獵之受甲之賕則移於乙得乙之賕則移於丙及其姓氏已定則家家被擾無遺矣此其弊一也省府發降糶本在各路則減刻於府吏之手縣不能得全數在各縣則減刻於縣吏之手鄉都不能得全數此及輸倉需求多門而每石之費葢數倍於官本矣此其弊二也立倉皆於郡邑城郭然鄉村之民近者三五十里逺者三百里其不通舟棹之處又多值饑寒賑糶往復跋涉之費若干聽候逗遛之費又若干雖舉以貸之而不受其直民亦末如之何也已發倉之際其司縣貪猾之吏市井憸巧之徒與夫權豪勢要之强有力者往往詭立姓名悉空其倉而糶之而閭閻田野困窮無聊之民雖一夫不得與焉此其弊三也各處闕官子粒充為糶本其吏貼人等往往挾官府之威而預期以徴之圖一已之利而穹價以受之名曰官錢實歸私室及其迫於上司之文移則臨時取其低價買糶帶水濕者有之雜粃糠者有之糧之損壊消折職此之由此其弊四也糶本發下各縣其提調官典該行吏貼相與為奸邪以青黄未接民間艱糶為詞飛申上司既從其請則移糶本以為他用及至上司或差官盤點或移文催徴往往倉惶失措或私券而賠貸於富家或低價而收買於鋪户糶未足而虚裝作數藏未乆而浥變損壊其後官吏倉官人等或以罪去或以滿去而賠償之責不過斗級數人而已或斗級所不能償則凡有産之家不免重受其害此其弊五也汀州居萬山之中其民不為他業惟業農以生雖以貧民遇斂歳亦必有積聚其地又無深溪大川舟棹所不到故穀價恒賤汀人固無所賴乎常平也官府賑糶明日收糴徒作虚文而汀人受其實害至有不可勝言者又况武平上杭二邑去汀州為尤逺其穀價視汀州諸邑為尤賤始者講究即二邑之境上共置一倉於黎畬取其道里均故爾殊不知聚黎畬而居者皆屯田軍也人人能耕家家積蓄方有司收糶之時二邑去倉各五十里欲水運則不可以舟欲陸輸則所費倍蓰姑得輕齎而就糶於軍而軍人坐得添價之利及其變糶之日彼二邑之民無一至者凡在倉之糧悉為軍所糶而軍人坐得減價之利國家立法之意本以為民而斂散之利悉歸於軍此其弊六也倉官攢典人等近以例革去而專其責於提調官使提調官賢亦不過無擾於民而已決不能為吾民利也苟或不職則任用非其人收貯不如法其病抑又甚矣此其弊七也建陽平糶倉乃前邑令勸率産民捨米以充之積至千石有竒擇士民之謹愿者司其出納而官不與焉民甚便之今尚無恙也崇安亦有平糶令其法一如建陽近因常平之設收糶未敷本縣迫於上司之㸃視乃以平糶倉所積之米充其數邑父老屢訴之曽不為理平糶所積悉歸於官常平之惠畧不及民上乖國家立法之美意下負百姓備荒之初心此其弊八也願罷各處常平悉歸徴元本還官若欲必行賑糶之法莫若勸率産民捨米如建陽等處平糶倉俾民自掌之如此則上不費官本下不傷民財而家無擾猶愈於常平區區所見特此具呈如蒙准信備申上司乞加裁覽不勝幸甚諭冦文皇元混一天下百餘年近歳搆亂河南湖廣江浙等處悉皆搔動人皆為國家憂之獨高見之士以為聖上寛仁大度宰相賢明天下必無事今各處郡邑盡行克復百姓俱以平寧自京師至福建一路無阻汝等居深山知紅巾之亂未必知紅巾之滅知縣官之有虐政未必知聖主賢相之有洪恩惜乎無人為汝宣達此意况泉郡古為佛國自歸附以來民不知兵雖有盜賊隨即勦除百姓享承平之樂他處所未有汝等一朝作梗禍連諸邑百姓受流離之苦前此未聞且汝祖汝父為大元民汝身為大元民大元何負於汝汝乃甘心悖逆為盜乎汝縣官未嘗結怨於汝路官未嘗結怨於汝城中之人未嘗結怨於汝旁縣官民未嘗結怨於汝汝敢焚燬他邑乃復攻打城池乎慈母十月懐胎三年乳哺方始得成人身官府設獄不敢輕人命必審覆無寃方置人於死汝等殺人如刈草曽不動心何也人家架屋遮風蔽雨養子育孫有三十年五十年不能完美者汝等焚屋如點燈使人無葢頭之地何也人生有貧有富自是分定汝等見富人如仇必欲焚其屋而殺其人何也汝等必曰半錠一石穀十兩一斗米尋常欲求一飽不可得今日既得酒食又得財物何苦而不為盜又曰官軍未大集民兵未大舉我何憚而不為盜嗚呼為此説者譬如魚遊釡中特湯未沸爾湯沸則爛熟矣家居惠安與汝等即鄉人也近宰永春於汝等即鄰邑也我才徳不及於衆恩信不孚於鄰是致汝等侵我土疆毁我縣治掠我人民惟自責已不敢怨人然深思以為盜之由誠非得已因為汝縣官吏鎮守官軍虐政所逼生事激變汝等一時有所不堪遂至於此間脅從者多有富足之家知理守分之徒豈不知古今順逆之理但無路脱身誠可哀痛也我乃永春令尹念汝等本皆良民也念隣之民亦皆吾民也豈可坐視而不恤哉欽惟國家許人以悔過自新近歳台州方國珍福寧州康偽元帥俱各聚衆數萬悉皆投首復業衆所週知汝等若能悔前所為開陳激變縁由赴官首告咸與免罪復業為民或能為官出力招諭旁縣賊徒盡數投首克復他邑即與申明上司論功陞用不亦善歟不然大軍四集玉石俱焚李志甫二年而滅羅天凌數月而亡其餘小冦亦半月一月而誅爾一則為康偽元帥等歸附復業一則為羅天凌等自取滅亡汝等誠熟思之孰得孰失姑以人情言之汝等身冒矢石日從戰陣每挈妻攜子入山傍林風餐露宿以達旦何如奠枕而高卧其家乎聚衆千百烹羊宰牛以為娛何如炊飯釀酒煨芋剝棗與妻子相對面乎汝等誠熟思之孰苦孰樂我不能掉三寸舌於汝姑移文以戒諭汝汝等其聽之毋忽跋伯章九龍卷鄉貢進士伯章公所藏畫龍九甚寳愛之識者以為所翁筆也一日為他人持去且二十載矣今復得之伯章以舊物復還自賀所與往還者亦往往歌賀伯章予惟龍神物也屈伸小大飛潛隱見其變化葢莫測也今而復還其伯章奮躍之兆乎龍之象屬乾乾為陽數用九以九變化也伯章春秋四十六矣今歳在卯由卯而午則四十又九伯章其以是年射䇿於九五天飛之庭乎跋趙茂叔山居圖右趙茂叔山居圖畫師李居中所作也藂山離立蒼蒨一色飛瀑由崖谷中出滙為平湖黛蓄膏停澄徹可鑑寒雲翠煙相與往還於莽蒼之外夕嵐掩冉坌起於林薄之間老樹高可百尺許柯葉紛敷茂叔𤣥冠縞衣坐其下左琴右書翛翛然嘯傲於埃壒之表厥趣亦竒矣一日茂叔持以示予予覽而嘆曰嗟乎世之厭塵雜者恒慕山居之為高然非誠能脱去富貴而甘心於寂寞者其能一朝居哉茂叔少侍宦四方壯而遊京師入國學歸而客錢塘市居非山也豈其平日之所慕者恒在是與夫自昔英雋之士孰不欲以才諝自見於世不幸而遭世之否則山林而已矣今者明天子在上雖圭蓽門竇之儒皆攘袂而起茂叔以英年實學方將與羣有才者相馳騖於功名之野兹豈山林時乎茂叔且徴文余為賦白駒之三章焉茂叔以為何如題牧牛圖榆栁之社蘆葦之鄉俯仰有崗巒數澤之勝焉牛數十為羣往來輕煙薄霧間牧豎穩跨牛背鞭箠不施任牛所適人與牛相忘於悠然之天而不自知畫者非深知其趣不能作此予田野人也於其趣稔矣今者逐逐車馬之塵無少休息忽覽此圖為之悵然題曽君世家盛事集吾泉自宋以來由進士出身至宰相者自曽魯公始公定䇿功臣三朝元老若蘇頌蔡確梁克家留正之相業視公則有間矣父子兩府唯魯公及子孝寛蔡確及子懋而已狀元及第唯公之從孫從龍及梁克家而已一門進士十餘人惟曽氏及楊吕石蘇四姓而已至如一門二相兄弟三人同時侍從祖孫四代書殿館閣則曾氏獨專其美而他族不與焉然則泉郡衣冠之盛莫曽若也琦生長是邦每閲郡乗及聞諸故老未嘗不羨慕曽氏之盛今年彦明君始出示此卷因知其事尤詳詩曰君子有穀貽厥孫子又曰無念爾祖聿修厥徳彦明君其勉之題山水圖予昔寓山中每覽溪山之勝心甚樂焉嘗有詩曰平生愛丘壑來此看烟霞野迥風光合溪深樹影斜小橋無客渡半嶺有人家獨坐楊陰下黄昏望釣槎葢紀實也今者奔走官事羈旅城郭間無復埜趣忽展此卷恍若曩昔所觀覽而賦咏者心為之豁然因題數語於後求麥舟疏至正己丑春友人三山方子不逺數百里至劍津袖舂陵太守木軒先生所贈詩以贈予且泣以告曰僕獲戾於天母殁未葬而兄又殁惟是坐一貧為祟二喪弗克舉有年矣鄉黨莫予知也故有是行仁人君子得無有范文正者乎予聞而悲之因為作儷語數聮於後庶好義之士讀之而有感焉必有能周其急者右伏以季札過徐君之墓解劍而行仲尼遇館人之喪脱驂以賻葢重義者不忘其人於既死而濟物者安知我之為更貧三山才子方氏素受業於木軒先生之門嘗登名於棘圍亞榜之外學由積於富命不幸而窮前喪慈母後喪難兄禍在接踵上有老父下有孤侄言之痛心幾載於兹二喪莫舉惟陟彼岡陟彼屺每為安厝之謀就有若斧有若堂殊乏經營之力倘非疾疚切已詎肯奔喪告人情實可憐義所當念大家周急庶小寛罄室之憂隨意贈財安敢必麥舟之惠求麥舟疏為建寧李宗父作龍江書院長艮成李先生没旅櫬權厝于兹八年矣其子宗文欲挈柩歸葬而困於無資尚義之士幸相與圖之伏以季札弔徐君之墓掛劍則行仲尼遇館人之喪脱驂以賻盛節既傳於昔遺風可望於今故龍江長李公藝精於勤行純而慤一經貢士嘗充上國之賔五載學官竟作他鄉之鬼夀則不固命亦何窮值時節之多虞圖歸葬而弗克親舍隔千里道路間闗旅櫬垂十秋光隂荏苒母在而年過八袠兒來而囊乏一錢方欲挈柩而還誰能損財以助凡在交遊之士寧忘惻隱之痛倘念故人舟中之麥勿吝亟歸黄壤墳上之草易青圭峯集卷下
