body:
  text: 圭峯集别集類四元提要臣等謹案圭峯集二卷元盧琦撰琦字希韓號立齋惠安人圭峯其所居地鈔本或作圭齋集傳寫誤也至正二年進士授州録事遷永春縣尹改調寧德厯官漕司提舉除平陽州命下而卒事迹具元史良吏傳徐燉茟精曰圭峯集嵗久弗傳近嵗惠安莊户部徴甫搜而梓之誤入薩天錫詩六十餘首此本為元陳誠中所編明萬厯初邑人朱一龍福州董應舉序而刻之在莊本之前然已多竄入他作如五言古詩春日思逺逰則在陳旅集中又五言古詩中過嶺至崇安送吳甫至揚州題焦山方丈壁秋日池上度閩關宿臺山寺絶頂早發黃河等萹七言古詩中有事居庸關走茟贈孟禮樂陵臺望月夜泊釣臺江南樂江南怨雪山辭崔鎮阻風逰吳山駝峯紫陽菴江上聞笛别友寒夜聞笛黯淡灘歌清湖曲海棠曲儒有薩氏子等篇七言律詩中髙郵城樓晚望燕將軍出獵寄鶴林長老和王維學海南還韻三衢守索題爛柯石橋登鎮陽龍興寺閣寄參政許可用送僉憲王君實金陵道中再過鍾山萬夀寺等篇共三十二首皆在薩都拉集中至于薩都拉溪行中秋玩月一篇自序稱余乃薩氏子云云班班可考此集乃改題曰儒有薩氏子序末又刪其至元丁丑仲秋書一句尤為顯然作偽不得謂之誤收蓋編輯之時務盈卷帙以誇搜采之富故真贋溷淆如此也琦官雖不髙而列名良吏可不藉詩而傳即以詩論其清詞雅韻亦不在陳旅薩都拉下編録移甲為乙亦非無因矣集又載賦三篇記六篇志詺二篇祭文一篇啓三篇雜著九篇則確出琦作非由假借今刪其詩之妄録者併其文録之以存琦之真焉乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀圭峯集原序豫産惠北里髫丱始知學即聞先君子暨諸長老言知有元進士盧公希韓者時惠文運未興縉紳學士大夫無多見去古未逺太朴猶存人知景崇先哲往往能談盧公遺語豫亦竊慕之問其居即今巴圗峯尾去豫家不及二十里而近豫暇日至其地嘗訪公故居則見其有古堂三四椽左傾右頽不蔽風雨中有元平陽知州盧公木主四壁之外廢垣敗瓦過而見者莫不為之躊躇而悽愴訊其子孫皆飄零流落隱於人間為傭作曾不知先世之有賢士相繼至於其鄉之氓又皆以海為市朝夕鬻販魚蝦粗鄙狡獪陋甚比屋不聞詩書之聲未見有一秀民出於其間者竊歎夫山川不變時代互遷大賢之後古多陵夷而於其地之微陋亦徑相懸絶昔之所聞如此今之所見如彼不亦良可慨哉盧公遺文豫未仕時嘗見抄本半集於先君子舊篋中薦經倭亂散逸無存求之二十餘年不獲一日得於吾鄉王君玉流氏乃元陳誠中所編為圭峯集與公之子昺所次為平陽集欲鋟梓而未就者當兵燹之餘家比為燼不知藏於何名山大川以得無燬或者鬼神呵護將使之俟後世君子以廣其傳也歟豫不類竊喜為之校閲敘録遂令鋟梓如左於戲公古之賢者也豫公之鄉人也先後不同時而惟賢我師也惠之先哲固未可謂無人唐宋諸賢邈矣文行不可概見居址亦無復尋惟公去今時未逺而居又近在其學與政固於豫心若曠世而相感者是之取爾隆慶壬申九月後學昆東山人朱一龍于田甫序惠安盧希韓先生圭峰集若干卷莊徴甫得之於于田朱大參家而猶病其雜也則使莊吳二山人損焉以授我又令我損焉以傳蓋存者厪十五六而古風獨全讀之金石發而星河流也又淙淙然若急澗寒響從以風雨漰湃四下百怪出而萬壑移躍躍於吾目何其竒也及考其行事先生生於元季方值傾仄多事之秋兩為縣令能以一言感悟鄰盜使之投戈縛其酋又能激用其民戰安溪流突數萬方張之巨冦持之踰年不得逞竟完其邑逮遷漕司提舉海口鹽場又能持法抗番大商以貨得參省政立能箠殺人者使不得奪國家之利雨敗場又能減算以禱以一言回暘其精神貫徹上變天地下變盜賊如此使其生逢休運都將相之權得盡所施設其勳烈可勝道哉元刑政不綱授盜以柄揭竿四起而據高位操朝政者方事賄奪忘國恤雖有迹烈章章如先生僅置之猥冗凌雜間不得究其施後雖以近臣荐起平陽而先生沒矣明興雲龍奮起一時佐命建功諸臣大抵皆元遺獻或以節顯者亦有之先生生不究當時之施死不逢興王之運獨留其詞章照耀天地越二三百年兵火灰燼煙消雨滅之餘而流風餘韻猶傳於士大夫之口沈淪幾晦久而復章此豈偶然之故哉吾觀先生文雖不如詩然皆有關政紀喻冦祈晴諸作通於幽明其論常平利害纚然指掌矣豫見往年和糴擾民大率亦若此世季弊滋何法而不為害安得盡如先生者而用之耶先生生平孝義初從其師余子賢試浙省師卒不顧試期而歸恤其家如在有加雖貴見師之友必拜則其撫暴化頑動幽明而名後世者良亦有本士非積於仁義而徒欲襮以文其長存也可冀乎先生名琦號立齋希韓其字圭峯則其所居之山取為集名者也萬厯已酉秋日閩中董應舉書
