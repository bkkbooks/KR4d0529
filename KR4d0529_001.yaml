泉鳴溪石如笙竽雙壺酒盡杯可沽盤饌狼籍溪可魚人間此樂更有無異鄉到處同里閭惟期母夀莊椿踰有子願效還哺烏作詩紀實無浮譽梅山行并引山在建城之南乃漢末南昌尉梅福避地處也一日偕政和簿會稽胡允文晉寧李士瞻古汴楊大年者肩輿登覽出入榛莽間直至絶頂間有破屋兩椽中設子真遺像傍有藥爐尚存去屋數里許山之凹有丹道士周姓者汲水煎茶為客獻四顧林巒追想竟日因賦山行以寓懷古之意云赤旗落色漢火微端門日日腥風吹咸陽秋色壓官樹金人夜泣銅駝悲先生袖疏探虎窟漢鼎猶堪支一足九重煙霧如海深門外何人知痛哭賊莽白日升郊臺玉璽墮地聲如雷周公揖讓孺子戲絳袍將軍何日來塵飛滄海風擲瓦白鶴身輕快如馬一聲鐵笛度閩關山月溪風共瀟灑龍爭虎鬭耳不聞長嘯袖拂松枝雲夜鐺白石煮秋雨風佩赤錦飄霞裙先生一去已千載尚有當時遺迹在題詩絶壁寄先生頓使孤峯顔色改藥爐寂寞秋草深丹井水落莓苔侵漢家瓦崩灰化土猶有丹光穿樹林五言律晚泊黃坑鋪清風嶺下路十里踏斜陽山色多凝翠人家半姓黃秋晴泉自雨夜冷月如霜冉冉年華晏征途底事忙題葉清甫緑波樓主人能拔俗每自捲珠簾野水春生浦山雲日傍簷陶家唯釀酒鄴架盡懸籖相見波光好秋來緑又添寄張子震南浦多芳草東風又落花相思頻入夢見説欲回家竒字從人問新醅為客賖自慚羈旅者猶滯錦江涯春暮寄友鬱彼園林景居然錦水邊花隂方半夜月色正中天清景歸圖畫和風上管絃惜春情未已窗外忍聞鵑送僉判趙宗吉大夫持憲檄來憩古松隂有馬行阡陌無鴉集泮林豐功登石碣歸道載瑤琴惟有前溪水分明照此心送許存忠之漳浦縣尹榕下年華晏逢君又送君銅章新縣尹鐵甲舊將軍客路長亭雨鄉心極浦雲公餘延里士樽酒共論文和木軒林先生寄本中韻玉人始相識猶憶在琳宫野樹雲間隔靈槎海上通荷香風共逺荔子雨初紅别後還惆悵何時笑語同寓榕州寄烏石陳晚對每憶山中老幽居晝不扃客多頻飲酒兒長解明經溪近鱸魚美林深荔子馨何時同晚對一笑聚星亭和林子蒼湖亭晚酌登臨多野趣未暇問朝簪南國秋聲起西湖暮景涵江雲連逺樹山雨落寒嵐同是他鄉客相攜看斗南宿僧房信步尋僧去經臺梵韻清竹窗雲影過草閣夕陽橫磬響開經卷香飄繞殿楹青山飛白鳥暮景一時生楓亭道中楓林村酒好使客醉初醒雲影驛傍樹月明溪上亭文章多舊藁身世似浮萍努力崇勳業休教兩鬢星惠安道中龍山兵火後百里總蕭疏官帑需新賦公田索舊租蓴鱸頻有夢鴻鴈久無書自笑成何用雲邊是舊廬答王經歷庭訓數日不相見文園病若何山城春事晚竹屋雨聲多幕府官如水門庭雀可羅東家有賀老杖屨肯相過寧化縣觸熱來寧化居人已賣瓜田園饒五色市井近千家孤塔凌雲聳青山對縣斜蕭疏兵火後撫景重咨嗟過建寧縣藍輿度林杪還向此中過縣古人家少山深秋意多民風原儉嗇官事只催科賴有二三友相從共嘯歌贈李逢原逢原為縣吏地僻類仙居俸入堪供母公餘每讀書詩人賡棣萼鄰叟餉溪魚家世應如許期君發軔初送長樂縣吏鄭生賦歸去吏隱大江潯刀筆蕭曹術詩書孔孟心潮平魚入市山近荔成林雙劍津頭客時時望好音昆山客邸萍水須相識居然子共歡天高秋月落江近夜潮寒湖海詩懷壯雲山客夢殘出門舟欲發猶自倚欄干送高教諭建安小洙泗之子去橫經逺樹含煙碧香芹帶雨青深衣登講席綵服戲親庭須憶分攜處吟詩栁外亭遊萬竹庵公餘乘興出時向北山遊翠雨環簷響清音滿座浮佛香晴殿冷僧榻午窗幽試弄桓伊笛涼風碧樹秋遊洞嶺寺古寺藏煙樹巖扉晝不扃日高花散影風定竹無聲稚子添香火間僧閲藏經新詩吟未就獨向殿階行遊東林庵窈窕東林裏幽人此結庵簷松青鬱鬱庭草緑毿毿對景應無住談禪向已參靜觀心自在明月照澄潭遊萬松庵昔賢歸隱處山路入雲長絶頂松濤吼幽巖桂雨香白雲封藥竈流水落蓮塘客至忘歸去連宵宿上方梵宇空山靜秋風晚更清嵐光連霧氣松響亂溪聲竹户流泉近蘭階落葉平夜寒人不寐千嶂一燈明遊北巖庵曲徑峯前轉臨行見虎蹤孤庵萬樹合絶澗一橋通芳草凝微露靈湫飲綵虹山僧面壁坐應悟萬緣空夜泊羊角壩繫舟羊角壩一夜夢難成月色千秋雪灘聲萬馬兵魚龍攀石出鳥雀繞枝驚惆悵渾無奈還添白髮生遊吳廷用南莊公事多餘暇看山到逺村雲莊依竹見樵徑過橋分野水晴舂碓巖松晝掩門所欣花縣近歸路任黃昏次鄭公除夕韻爆竹聲除臘洪鈞氣轉春一年詩太苦今日酒偏醇援筆題桃帖焚香供玉宸仰看雲漢外斗柄指東津送福唐林氏兄弟故人傷逺别對酒且淹留冠蓋臨溪上旌旗夾道周風霜下殘日鵬鶚起高秋獨有林才子贈言多逺猷次繁昌邑宰梅雙溪韻矍鑠繁昌令曾為觀國賔儒冠猶破帽禮服尚垂紳淡泊心無愧清癯自有神老膺朱紱貴驚看白頭新七言律寄同年狀元拜珠善御史臚唱乍傳同虎榜繡衣還見上烏臺石頭城下題詩遍天目山前攬轡回使節照江秋水立諌書排闥曙雲開東南赤子瘡痍甚日望分司御史來客武林寄馬元臣山之英二同年結束琴書上帝畿誰知人事與心違半生薄宦真堪笑六月扁舟獨自歸淮甸水深荷葉闊吳江煙暖稻苗肥行囊只有詩題富寫向天風寄繡衣山之英寓所觀壬午進士題名記有感曾攜賦草入天門五色雲中謁至尊一代文明千載會十年耆宿幾人存塵中事往渾如夢客裏情親得共論浪説題名垂不朽相期努力答君恩自高郵買舟還江南至常州值雨寄魯元達萬里扁舟偶獨還毗陵城下少盤桓天連曠野青山少雨滿空樓白晝間旅邸有人垂顧問家書何日寄平安半生勳業成迂闊猶自窗前把鏡看和韻答白明之君厭區區簿領勞詩人相對便揮毫幽居最喜青山色熟睡不知紅日高夜雨江湖談舊事秋風庭院試新袍笑他名利途中客一似扁舟駕海濤汀州道中七閩窮處古汀州萬壑千巖草樹稠嵐氣滿林晴亦雨溪聲近驛夜如秋雲間僧舍時聞犬兵後人家盡買牛但得龔黃為太守邊方從此永無憂寄泰寧鮑縣尹重岡復嶺渺天涯觸熱馳驅力欲疲但願官倉長有粟不愁客路更多岐政聲盡説於陽好心事還逢鮑叔知别後思君勞夢寐樵川川上月明時鮑侯招客梵宫遊傑閣岧嶤近斗牛山勢北來如展幕溪流西去可通舟半峯落日孤城晚一榻涼風萬葉秋想有新詩留絶頂還應寄與故人不雲巖書院路入秋雲翠幾重人煙山色水聲中精廬不廢名賢祀勒石還鐫舊令功野徑涼生松葉雨畬田香滿稻花風醉歸馬上頻回首鰾眇亭臺倚半空臨汀城外别丁景文六月騎馬奔出郭故人相送高洋橋百年古郡千峯繞萬頃平田十里遙客懷欲别且須酒溪月自來何待招後夜相思定何處亂山疊疊雨瀟瀟趙孝子卷仙居連朝雨雪集孝子血淚盈衣襟層空忽爾露日腳寸念直可回天心何處買山埋白骨有人作傳勝黃金顧余無限思親意南浦相逢感慨深周孝子卷當時翁媪去何之四歲孤兒托付誰祿養莫酬平日志畫圖長寄百年思田園夜雨先廬舊屺岵秋風宰木悲我有二親俱已矣不堪對此淚雙垂題徐方外捕盜應夢圖徐老平生志不羣力能擒賊勝千軍一官落拓司征日數紙縱橫紀夢文湖海至今傳異事朝廷終不負竒勳西風南浦還相見擊節狂歌月到門釣龍臺下解舟去大庾嶺頭馳馬過驛路雲生椰子樹江城月滿鰐魚波青山是處題詩遍緑野從今買犢多客裏送秋仍送客瀟瀟秋雨奈愁何送朱希文江城水闊鴈來稀閩嶺雲深去路微風土於人誰信美年華驚夢不如歸過家幸遇賔興日行路寧辭露濕衣安得重為論宿昔好賖鄰酒扣柴扉送吳元珍幾年不剪西風燭此日相逢如别何冷宦莫嗟鄉國逺故人今在省臺多閩關把袂雲生樹灣水維舟月滿河我爾重尋燕薊路鳳城載酒日相過贈片雲上人曽憶相逢月臺下清談猶自帶煙霞避喧却愛山中寺訪舊還尋海上槎石鼎烹茶分野水紙窗剪燭看簷花定知歸去松蘿路猶向雲間採藥芽次韻答林迪齋陳景淵村北村南學翠岑二分觴詠學山隂塵中歲月成何事巖下煙霞識此心三徑落花紅􅉡􅉡一溪流水碧沈沈村醅時向鄰翁醉不羡渠家帳下斟送萬謙甫歸銘山每向銘山山下過還來此地却逢君少年從吏身何忝平日吟詩興不羣十月虎林天欲雪一舟漁浦水連雲自憐客况無聊賴耳畔蛙聲不忍聞依韻答歐士中客舍凄涼生緑蕪經年祇傍野人居樽空每買鄰家酒巷僻應回長者車白鳥夢殘楓樹冷黃花香老竹籬疏相逢且莫談離别一别如今十載餘送孫君猷久客桃源若避秦孫郎一見却情親詩才直欲空餘子書法猶能學古人黃瘴秋深雲似墨緑波夜靜月如銀元戎麾下應相問為道年來白髮新寄吕用賔縣尹烽燧年來暗不消溪南劍氣夜干霄共歡百里塵初靜猶恨諸酋首未梟剪燭西窗山市雨移舟南浦海門潮桐邊定見尹明府為寄相思道路遙重遊蓬壺因呈諸公一笑匹馬重尋蓬島路東風二月栁花香曉煙萬笠人耕壟夜雨孤舟客卧牀野老送迎悲往事山童歌舞學紅粧羣賢此路從來少未必山隂勝永陽我來作縣已三載偏愛毗湖春酒香溪上畫橋朝繫馬雨中茅屋夜連牀多情啼鳥短長曲無數桃花濃淡糚欲學淵明歸種栁不栽桃李滿河陽依韻奉呈敬在博士先生并簡諸公一笑遙逐薦書遊薊北暫將教鐸振泉南桃花門巷晚風急燕子簾櫳春日酣海內干戈垂盛化山中燈火照清談興來共飲溪邊市一任人嘲醉墮簪豫客莆中同登壺山真淨岩訪古道了堂二師松扉深入白雲中攝蹬捫蘿路可通結社幾人從惠逺登山何處覔壺公五更客夢茅簷雨六月秋聲木葉風獨倚欄干望江海故鄉應在海門東至正已亥六月遊壺山宿真淨岩訪忠門西江陳公江亭懶聽江城奏鼓笳却從村塢問桑麻臨風亭館非人境近海雲林是我家山徑草肥嘶瘦馬石磯水淺動輕槎山間猶自憂民瘼日暮回頭看稻花樹下松扉絶點埃何須海上覔蓬萊十年客鬢塵中改六月襟懷酒後開雲影不隨飛鳥沒江聲偏逐晚潮來干戈滿眼風塵暗欲别西山首重回再道江亭用前韻酬美中近來南國奏胡笳處處干戈亂似麻避俗每觀高士傳過江直訪故人家百年風雨祠前樹萬里雲濤海上槎猶憶太平無事日西湖載酒賞荷花挽安童參政先任興化太守後任參政分省興化昔日郡侯今將相出師未捷殞邊城空令父老思黃霸重使英雄弔孔明公論有人書野史旅魂無路到神京東山賔客知多少誰似羊曇涕淚傾和虞伯生寄張總管韻玉署仙人化綵雲每於江海見遺文百年詞翰真無敵五馬家聲賴有君堆笏牀頭餘舊物讀書窗外種芳藝停驂只在西湖上一席西風許共分寓平南善應庵述懷薄宦曽充鹽莢使經營邦賦愧非才此身已擬休官去斯地還因避亂來欲覔桃源終鰾眇偶過蓮社且徘徊家僮莫問村醪熟我已兼旬廢酒杯去年過此身猶健今日重來一病翁亂地風霜如塞上隔江煙火是莆中孤鴻唳月秋空碧萬葉經霜野樹紅竹下閉門來客少清談日與老僧同病中懷王德輝憶與故人分袂日遊魚吹浪動新荷一年又見黃花老兩地相思白髮多月落峯頭霜滿樹雨餘溪上水生波知君囊底詩偏好寄與茅齋敵病魔題節婦卷陳家有女李家婦三十哭夫應斷腸梧葉幾番深夜雨梅花一樹短籬霜閣東才俊眉俱白堂北光隂鬢已蒼不待門前植華表人間野史百年香三月晦日鄭友雲招飲客鄉寥落三春盡惟有故人情最親不管柳花飄巷陌却從藜杖過比鄰簾間銀燭搖疏雨酒後金盤薦細鱗何日攜樽郊外去緑隂庭院更宜人客建寧别李季昌壺公山前曾賦别越王山下還論文採茶夜煮南浦雨尋山曉踏西巖雲青囊經在君能説丹鼎功成我欲分客舍明朝又南北涼飇送葉秋紛紛遊真淨巖和方時舉韻林下高僧睡得牢春風幾度到園桃龍歸洞口雲猶濕鶴唳峯頭月正高千里溪山無戰壘半江煙雨有魚舠我來還憶方時舉斗酒篇詩意氣豪答樂嶼陳樂齋曾向虞庭看鳳凰微生自喜際明良久無消息通蓬島忽有文章落草堂永夜懷人江月近頻年笑我石田荒渭濵釣叟君知否老去功名汗竹香送府掾之永嘉福唐郡吏東陽客此去永嘉知幾程三秋忍與故人别千里還將慈母迎橘柚滿林香露重魚蝦入市晚潮平交遊我有同年在相見還為道遠情和朱仲綱赴杭韻客中送子西禪度落日寒煙滿翠微美玉無瑕和氏泣蓴鱸有興季鷹歸江城鴈過秋生樹野店雞鳴月在衣壯歲功名須努力只今搜士到柴扉寄題長樂王隱君小圃聞説隱君遊小圃日題詩句滿蒼苔巖前石澗呼童吸洞裏柴扉待客開花氣一林香霧合竹隂半席好風來買舟何日來相訪共倚青山把酒杯贈雲峯道人江湖十載老仙翁手拄枯藤剡水東玉笛數聲秋月白錦文萬疊曉霞紅雲隨杖屨無心出海繞蓬壺有路通山嶽明朝何處客好隨詩句寄飛鴻太平驛和月林野間韻驛路迢迢過建溪回巖古木野禽啼征衫上馬秋風早荒店聞雞曉月低新酒一番留客醉寒花幾樹與人齊定知明日吟詩處楊栁依稀水閣西遊金峯寺杜宇嶺上秋聲悲金峯寺前石徑微亂山雨過晴嵐滴逺樹風來落葉飛稚子跨牛行野岸詩人下馬扣林扉白雲片片東南去故國魚肥客未歸再用明之韻二毛侵鬢見還驚却向青山似有情客路風煙春事晚鄰窗燈火夜深明牆邊桑柘家家雨郭外松楸處處塋自笑行藏何太拙謾將懷抱向君傾和仲賔監縣遊考亭韻幾度清遊溪上亭更於何處覔仙靈一庭花落黃金粟千里山開緑玉屏人世可憐春又老客鄉相見眼偏青草堂久望高車過日日柴扉不敢扃和林子蒼玄妙寺值雨兩袖薰風緩轡遊粵王城下少淹留客衣半濕松花雨鶴影先分竹院秋採藥僧歸雲外路吟詩人倚樹間樓憑君汲取前溪水為洗塵中浩蕩愁再遊仙宗寺約曾元瑞不至畫角聲殘曙色開吟魂先已繞山隈涼風入樹鳴茅屋疏雨吹花落石苔老鶴不知仙已去蹇驢還載客重來故人却負煙霞約何處青樓把酒杯仲秋寓徑江張伯雅席上作征衫一路拂輕埃袖得嵐光渡水來月色不如今夜好客懷應為故人開香隨桂子雲間落夢逐潮聲海上回醉倚西風賦離别明年何處共銜杯陳教諭見和因復用韻答之風流人物出塵埃曾入都門獻賦來宦路不知雙鬢改講帷又向八壺開月明茅店雞初唱煙暝松林鶴已回客子歸途相邂逅今朝把酒是離杯寧德寄呈鄭德和參政繞兵古田省垣徴發羽書忙賤子元宵到上方光滿玉田千嶂月寒生瓦屋五更霜野人已厭干戈苦官馬仍愁道路長珍重老僧為相報元戎先已到於洋劉祕監山水祕監揮毫意正酣依稀風景似江南經年修蔓搖秋色隔水遙峯起暮嵐千里郊原天渺渺半空松桂雨毿毿故山亦有溪山好自笑征塵日滿衫贈畫師春山人在春山紫翠間旅途今日忽相看潮生逺浦孤帆小雨過蒼崖古木寒筆底雲煙長滿屋壺中風物共憑欄江湖何日重相會惆悵樽前别更難松下軒晚景無心與世諧一軒長傍萬松開空庭日靜春苔合老樹風高翠雨來病後茯苓還自斸吟邊仙鶴不相猜歲寒亦欲尋良友只恐山靈促駕回題松江寺僧遊浙卷松下上人相邂逅座中為我説天台每瞻大士雲間現曾訪羣仙洞裏回明月在梁虹影動西風入樹鶴聲來逺人亦欲東州去凖擬題詩滿石臺松江道中兩袖西風此地過清秋八月滿煙波粳田萬頃連天逺茅屋千家近水多每買鱸魚供晚餉愛聽稚子唱吳歌年來自笑行藏拙獨立蓬窗對素娥分水關和朱明仲韻誰鑿巑岏作巨藩﨑嶇盡處一逢原千巖流水東南合萬疊晴巒紫翠屯驛使停驂松外路居人買酒竹邊村道經烏石頻回首山後山前多白雲雨後平林逗翠光與君攜手下崇岡小橋跨澗村舂急老樹吹花野店香逺路出關如獨鶴好山對岸似羣羊金川亭下披襟坐日暮不勝嵐氣涼廣信道中瘦馬還從廣信過一番天氣又清和青梅樹暗人家少黃犢泥深野水多南浦採茶供歲貢北人緩轡聽蠻歌平生漫説封侯事不道年來鬢已皤登姑蘇臺有客攜詩此逺遊欄干倒影沒寒流千年歌舞渾如夢九日登臨總是愁故國黃花應未晚孤城殘栁不禁秋蓴鱸倘遂南歸興笑向橋邊問釣舟寓海壇歸即事十年關塞未休兵多少閭閻歲不寧客子買舟尋舊好主人下榻慰飄零庭前老樹風鳴屋山外疏槐雨滿汀當道諸公如問訊為言卜隱傍林扃福清平南道中輕輿五月歷郊埛萬事都非舊典刑省檄一畨新繕甲民兵十户半抽丁雨餘野水村村白海上煙岑點點青只合早尋丘壑去年來鬢髮已星星寓福清寄山東魏宗十年塵土涴冠襟自覺新來老病侵伏櫪空懷千里志登舟豈負五湖心天浮南海鯨波闊人卧東山豹露深自笑逃名猶未脫重煩軒蓋逺追尋題蕭山韓家湖亭坦蕩主翁能愛客暇日開樽湖上亭漁浦秋潮生野岸山隂寒翠落疏櫺香雲凝紙詩都好涼月當軒酒未醒自笑紅塵吹兩鬢隔江遙望數峯青題南岡上人詩卷曽見天華落講堂翩然振錫白雲鄉蓋茅絶壁星辰近採藥深林雨霧香獨鶴當窗松影瘦老龍歸洞夕隂涼相思欲寄新成偈落葉蕭蕭山路長姑蘇舟中曩時曾遊姑蘇郡明月于今幾度圓闤闠萬方春似海煙霞千頃水如天暮雲松徑僧歸寺夜雨蓬窗客在船遙想繡衣驄馬客多情應念舊同年清河樓上小酌即席和子儀韻典衣沽酒栁邊橋今日重來憶昨宵竹屋雪消渾