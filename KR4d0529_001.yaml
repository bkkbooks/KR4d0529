body:
  text: 圭峯集卷上元盧琦撰五言古風度嶺於崇安命棹建溪人生天地間馳馬歷大塊役役功名場歷歷山水會偉哉東南區􅋂險閩越最車書四海同風氣一嶺介肩輿度層霄手棹下急瀨四山抱回流環合如束帶玉井蓮葉漂仰面天作蓋倐馳丹峯前却作紫嶺背微隂間雲霞凍雨灑松檜深林樵牧歸落日山鬼會雪瀑挂水簾松風奏天籟石梯架仙岩往往遺迹在瑶草石上生丹藥市中賣巍巍考亭祠過客祠下拜溪水自成文上接洙泗派喚渡雲間僧貌古清可愛手把青松枝趺坐溪石待懸崖虹棧危插竹漁網晒山高人蟻緣下視舟一芥輕舠類飛鰍宛轉亂石隘崢嶸龍角尖磈砢黿首癩嗟吁激頽波出沒水中怪萬古槌地雷三峽瀉澎湃峯巒爭送迎奔走萬里快箭過耳邊風開口不暇咳峭壁起衝流恍若巨鰲戴上有舊題懸歲久字迹壞豈無功名存倣佛年月載覽此前人蹤徒為後人慨天氣易寒暄光景倐明晦浩蕩三日程應接千萬態會登天柱峯一覽宇宙大和八伯章和賡元魯應奉韻芳辰天正暄間居日多暇羣英總能詩往往韋陶亞白雲在郊外相望無一舍招提夙所期欵段亦可駕數峯互參差百卉相枕藉持杯有紅裙蓋鞍匪黃帕衣冠蘭亭會林壑輞川畫嗟豫在塵蹤屢嘆流光瀉區區縛簿書役役劬晨夜重遊錦江隅獨憩茅屋下開軒招鶴來入市借驢跨任從傍人笑免遭官長罵見説絶妙詞一讀一瀟灑無因陪華席猶可續佳話願攜北海樽往結東林社昨朝棟花飛今朝杏花謝行樂須及時敢辭出無馬咨王侍郎寄禊原魯應奉名門世所仰偉器人初識除書出省垣匹馬發山驛金臺芳春宴玉署清晝寂年富經學優事簡官情適笋班綵雲曙蓮燭明月夕登岡望庭闈開閣集賔客鮿生寂無聞良晤何由得髮鬢亦已華意氣徒自激題詩寄天風渺渺煙樹碧借曹汝敬晚對亭酌因敘相思相勉之意涼風鳴庭柯積雨過林巘披衣攬明鏡坐恐歲華晚盈盈牀頭書自舒還自卷念爾西窗人殘燭共誰剪簪紱垂光彩仕路需俊選巍巍黃金臺往躅或可踐相思亦何屢相期良獨逺人生易白髮世道少青眼盛時各有待幽趣貴自遣寄語三徑翁蒿萊為子剗題待月亭卷郡西古招提樓臺跨城邑小亭僅數椽日落晚涼入二侯曾此遊徘徊松下立開樽待明月月來海風急俗韻忽已消素光良可挹天容萬里淨露氣千松濕酒闌賔客歡詩就魑魅泣蹇豫塵土蹤驅馳慚靡及時來弄清暉每擬續佳什文園多病早浣花百憂集願言問嬋娟何當謝羈縶漁樵共話圖樵夫初上山漁父才泊船邂逅即相問生涯兩堪憐我渴魚可羮爾歸突未煙爾魚莫索價我薪不論錢惟將薪換魚一笑各欣然送塗嶺巡檢約蘇穆爾之莆田尉將軍有英氣負劍遊南荒曾陪繡衣客經踏烏臺霜戎閫拔才雋奔走殊弗遑屬時臨漳郡羣盜方獗猖匹馬汗如雨戰袍北風涼奮身良間關許國成慨慷茂績固當讐小試為足償菱溪枉車轍司警驛道傍蒞政肅初令頽網日更張月靜鼯驚山暝狐兔藏編户復奚事在在樂歲康所居傍林塢訟簡白晝長鄰家稻田肥子舍藝編香優遊有旨趣於焉度年光夕露集野草秋飇在垂楊解裝欲何之作尉壺山陽莆民喜公至夾道相迎將泉民惜公歸所懷未渠央民俗豈不殊美化端有方願言頌政謡毋庸咏離章他時登要津萬里誰能量贈莆陽蔡可禹有序莆陽忠門西江陳公建義學于家之西南延致可禹蔡君以教里之子弟蔡公忠惠之後因裁詩贈之忠門郡城東陳氏培世德一老髮已蒼諸郎眉總白屋南規義孰去家才咫尺教養酬初心經營闡嘉績蔡君忠惠孫於焉正師席吟詩思不凡講學亦已力野叟聞絃歌里人慕矜式澆風自此袪古道今可即余生遭時艱來作忠門客因緣此相值一見如舊識松隂六月寒海水一天碧談交臭味同避俗煙埃隔追隨豈不好聚散或難必共惟忠惠公文章在簡册勗君良匪他願言紹先澤龍江山平逺樓龍江居人稠市井若城邑陳君作江樓塵雜不相及身間千慮遣日駐萬境集羣峙兩岸山一一如拱揖大海東南流海氣日呼吸長橋亘百丈層塔崇七級微茫認島嶼曠蕩辨原隰潮聲山外寒嵐氣屋中濕古寺煙鐘來遙浦漁艇入霜晴鳬雁浴月白蛟螭泣賔朋事幽討觴咏屬佳什蹇豫簿書煩乃受升斗縶公餘強登眺詩思轉羞澀江空歲年晚日夕天風急行藏我何心倚欄還佇立贈逸巖道人逸巖方外士鶴髮雙眼碧常登虎山巔一覽天地窄飄然駕雲還來作龍江客門前海潮生屋上嵐翠滴開窗寫黃庭汲澗煮白石嗟豫縛微名十載事行役何時濯塵纓從子叩玄賾題李月海卷皎皎明月光浩浩海水深明月常在天海水無古今人生穹壤間百年漫浮沈所以李月海煉丹瑞巖隂翁居瑞巖隂披雲結精廬夜玩海底月淡然心與俱海水天地寬明月何處無丹成跨黃鶴一舉凌太虛挽陳本中學録莆陽忠門鄉陳氏世樹德偉哉錦山孫少年擅眉白擔簦良獨逺種學亦已力豈無天人書亦有治安䇿方期仕路亨詎意風塵隔壯志竟沈淪善類每嗟惜秋高雁行斷曉寒鸞影隻堂上白鶴翁哭子長戚戚佳城邈何許日暮煙草碧遙望壺公雲題詩雙淚滴題陳允中山居卷山妍雨初暗洞窈雲常暝琤琤碧澗流落落青松影遊咏有高人誅茅臨復嶺開窗翠嵐香展卷白日永興來即吟詩客至但烹茗抱琴莫出遊蕙帳夜深冷存與堂人生宇宙間所貴培本根本根一以蹶枝葉何由繁黃金照筐篚腴田跨郊原豈無百年計零落烏足言莆陽有佳士結廬東沙村天高海氣清地靜山色蟠哦詩風滿簷橫琴月當軒客來試相問何以與子孫主人笑且答所與即所存所存但方寸此外勿復論懷哉古聖哲種德在後昆隂隂三槐庭奕奕駟馬門芳名尚不朽往轍猶可援君家有英兒學問知淵源駸駸富貴來於焉賁丘園豫亦慕古道撫心良弗諼晤語嗟未諧意氣期相敦裂箋寄秋鴻臨風嗅蘭蓀題潭州劉氏姊妹孀婦貞節雙藤本同根長大附高樹樹倒何所依不離樹根土劉家好姊妹嫁作儒家婦儒生遊不返姊妹何所去憶昔嫁夫時各期以偕老今日無所歸骨肉自相保一爐鑄兩鏡懸置東西窗窗前無主人兩鏡復一雙哀哉復賢哉劉氏有二孀過高郵飄蕭樹梢風淅瀝湖上雨不見打魚人菰蒲雁相語秋風吹白浪秋雨鳴敗荷平湖三十里過客感秋多白鷺愛秋水獨立仍自行得魚故偶爾驚起亦常情沙邊見漁家捕魚湖心裏夫婦同操舟白頭共生死破罾一天闊小舟一葉輕相傳與子孫終古無戰爭過紫薇菴訪馮道士道士愛幽居年來一事無盆邊瀉新雨石上種菖蒲山中花蓋洞石上冷瀟瀟不見眠雲客惟逢避雨樵研硃白露清點易太玄經盡日無人到小窗蘭花馨題汀州丁溪知事卷三溪會汀州上有仙人居乃是丁令威玉珮搖瓊琚高秋下風露水清芙蓉渠華表慣聞鶴小船間釣魚鑑湖分半曲賀老意何如舟行秋暮舟行厭湫隘露坐臨赤日赤日不可當又復蟄蝸室安得聿生羽飛上太華峯濯足玉井水散髮雲臺風答福唐林氏兄弟詩大聽聽若聾志士時若瘖所以陶淵明趣得無絃琴悠悠南山青采采黃菊金歸來一篇詞千載猶賞音抱病者奔馳愧古仍愧今海東有雙鳳羽灑元氣濕高閣五雲端一飛九千尺下視燕雀曹蓬蒿自相習高岡時一鳴唧唧俱斂翼今年西北去去年東南征江山南北路歷歷俱動情官程不暫停日沒仍夜行空江風露下曠野河漢傾浮雲隔海岱明月知我心萬山二水合匯之為深淵劍化亦已久過去猶凜然神物豈常處入地或升天所以磊落士豈為俗所憐當時二龍劍乃是山川精埋沒獄礎下異氣騰豐城神光射霄漢斗牛為不明一入壯士手長鳴除不平將至大橫驛舍舟乘輿暮行山中山行日已暝肩輿度林薄涼飇凄以清松子當面落千山月崔嵬萬葉風蕭瑟昨日棹歌行頗憶溪上樂月輪轉頭上溪籟奏足底人行山翠中葉落雨聲裏虛名為一官行子在萬里行行重行行日夕聊復止聞秋蟲有感秋蟲集草樹凄聲亦何繁行子在逺道豈不思故園黍稻上丘隴鳥雀亦忺喧田園可將老軒冕何足言晝卧雲際亭紅塵如海深渡水卧雲際白雲如海人千峯走羣婢長嘯谷生風葉落飛滿地一鳥沒遙天逺樹秀如薺贈白雲白雲亦何間竟日不下山時從修竹裏相伴一僧還悠悠覆松頂渺渺歸岫間奔走塵俗者視君何厚顔望武夷溪行望武夷峭壁何嶄絶赤霞散不收大化元氣泄下有萬年松上有太古雪祇恐月明中鐵笛吹石裂宿武夷􅋈舟山水間借宿武夷觀月挂水晶簾風吹紫霞幔雞犬入雲中笙歌起天畔傳語杜聘君酒熟幸相喚宿武夷山會杜聘君夜宿武夷山乃識青碧叟清談道士同險語山鬼走出門視河漢危梯挂星斗白露滿芙蓉清寒夜吟久我識杜青碧深居武夷山採藥紫芝嶺行歌白雲間天梯遙可躡月户高可攀天子召不起道人間往還題焦山方丈壁江風入霜林寒葉下疏雨蕭蕭復蕭蕭可聽不可數山僧亦好客呼童掃行路到處尋秋聲披雲入山去送吳父之揚州青楊吹白華銀魚跳碧草落日上江船三月淮南道渺渺春江涯悠悠雲樹杪安得快剪刀江頭剪芳草寄王伯循諸公木葉淮南秋蘭橈泊瓜渚把酒三人同江亭看飛雨雨過江色淨妙景發天趣歷歷江南山一一青無數大江湧金光穩如青蓮座就中有龍宫人見不敢唾江山萬古同日月片帆過把酒妙高臺狂歌醉相和飄飄鶴林僧布襪青鞋雙長江飛鉢度大海蛟龍降逺來作偶别楚雨鳴秋窗振錫獨歸去天花飛渡江微茫楊子橋細雨濕秋色小艇載吳姬遙遙路相接風起布帆高一往不可得夜宿廣陵城吹簫怨明月過清溪道士江野舟孤舟橫野水門外雪初除白日莫放鶴清溪間釣魚江南正月半猶自有梅花踏雪去何處清溪道士家秋日病起池上顧兹林塘幽消此間日永飄風舞萍根落葉散魚影天池風露涼秋深藕花冷有懷無與言獨立心自省宿烏石驛雲起烏石峯雨洗紫溪嶺旅館入山深愁人覺宵永燈花剪復開風竹亂不整清晨度閩關南斗落衣領好寫度關詩筆頭點石笋度閩關曉度分水嶺身在雲霧中手叩天上關聲落山下風雷霆走澗壑神人過虛空頃刻開萬象赤烏飛嶺東白髮下千峯盡入懷袖裏振衣度閩關灑作山下水仰觀天有梯俯視井無底古來守關人盡作山下鬼寒食百草青春風吹不起寄沿山别駕烏延子忠我識顔别駕風度修且間近持五色筆輝光動南蠻甘飲石井水卧治鵝湖山玉峯露灑灑楓林佩珊珊表表臺閣姿豈久州縣間相思不相見可望不可攀海風吹夜月飛度七閩關同幕府楊子丞李伯真避暑烏石上晚酌天章臺晚涼上烏石置酒天章臺日夕下山去海風吹月來白露灑仙掌銀河洗金杯誰識芙蓉山飛身入蓬萊高臺在層霄肩輿上絶壁露下酒橋涼月出海門白坐拂衣上雲醉卧林中石西風吹鬢毛南斗在肘腋宿臺山寺絶頂江白潮已來山黑月未出樹杪一燈明雲房人獨宿近水星搖動河漢下垂屋四月夜雲深繁隂倚修竹望鼓山鼓山起千仞乃是東海根蛟龍穴其下霹靂翻海門砥柱儼不動日夜雪浪翻何當臨絶頂俯視浴日盆春日思逺遊春日思逺遊逺遊欲何止角哀見楚王伯桃樹中死出門逢路人天下無二子春草一尺長春日一萬里上有無情雲下有無情水至治辛酉九日與用平上人純仁茂才遊西山福清寺有感芳月忽已晏賞心遂蹉跎薄言採秋菊于彼南山阿杖藜古蘭若班荆多娑婆上方秋杪集中秋白雲多野果被清露石竹緣長坡搔首徒延佇懷人獨行歌陳王布金地蟋蟀鳴寒莎淡然釋氏子白首心匪他為豫别三傑玉石了不訛香坂有芳蕙平池有高荷二者豈不美如此日夕何送别古井九仞餘不如人意深薄交屢識面豈若兩同心子行風霜野我望雲山岑相邀自逺