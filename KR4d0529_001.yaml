綸方面分廷務東吳振日宸具瞻岩石峻列坐廟堂珍薇省花容暖春城栁色顰迎歸舟楫具文著憲章純接履登高位乘槎據要津推恩均雨露舉首近星辰賤子初登第明公領縉紳疏慵期采録悚懼走逡巡忝對南宫歲長懷北闕晨三年親簿領幾處困風塵從事沾微祿鮿生似舊貧駿奔惟恐後久屈欲求伸拙守詩為業懷成道日陳駑才慕驥足汙瀆敢攀鱗曩昔期朝士遲回忝國賔願言為汲引自許絶緇磷北斗天河上南州瘴露濵惟將涓滴念日夕望秋旻贈府訓林先生之京二十韻堯厯開昌運升平十四春鶴書馳雲路鶚薦貢儒珍宦族西湖裔家聲閥閲親異才舊卓犖衍慶自殊倫彼美仙壺客由來紫帽鄰範模資郡泮俊秀萃成均鱣雀升楊震桂林羡郤詵雕盤辭苜蓿瓊宴念嘉賔射隼高墉上乘槎天漢濵器成時獲利道達志常伸際會風雲日沾濡雨露晨秋鵬搏翼健霧豹澤毛新正欲摳衣侍那堪别話陳東亭芳草合南浦緑波鄰驪駒間戒僕紫燕語留人俯拾金閨彥行看晝錦臣諸生刺桐下側耳好音頻七言排律贈周信玉秦川周子衣冠胄家世相傳幾百年青草一庭香滿屋白岩萬古勢連天讀書空谷人如玉喚渡長江月在船夢寄短檠疏雨外詩成石澗古梅邊忽驚紫氣排雲入共喜清宵聽雪眠歸去故人應問我為言荒落尚依然餞孫復齋赴南雄同知聞説刺桐城外道使君七日赴南雄楓宸錫命黃金帶荔浦飄香繞玉驄劍拂洛橋濤泊岸驛經庾嶺樹連空山中五月畬田熟海上諸州水道通幽澗晝飛椰葉雨寒潮夜渡鱷魚風緑林處處歸民伍皂蓋時時謁學宫定有諸生師栁子莫將循吏讓文翁化行稚耄謳歌起訟簡賔僚笑咏同千里相思明月夕新題遙寄海雲東五言絶過峽口浦峽仄蜂腰斷溪回燕尾分行人思澗壑身世若浮雲縣齋間坐偶成庭樹雲初晴雙雙鳴鵲聲六花消未盡猶照葉心明翠峰梅雪蒼龍吼翠濤白霧迷青壁頃刻赤烏飛風枝墮殘滴七言絶題杜容可篔居卷種得篔簹日轉添東風暗緑上疏簾近來春信知多少屋角新梢已拂簷道人家住緑雲間日日吟詩獨倚欄二仲不來山徑晚一簾清影作秋寒興化道中雨過山城野水渾夕陽黃犢卧籬根吳塘父老應相語昨夜南船到海門泊洗溪驛篷底凄風過似箭枕邊急浪響於雷夢魂曽到桐隂下夜未三更又却回歲寒木落山空徑節存獨留清影向黃昏滿牀風雪無人到知是江南何處村和鄭子經遊仙宗寺韻玉堂老鶴仙騎去白雪滿空何處尋昨夜飛來峯頂月分明照見古人心再用子經韻簡曽元瑞千里青山緑樹深雨中騎馬愜幽尋故園松柏秋風早無限新愁上客心蓬萊弱水渺難量何自堪求却老方佳客不來成獨立一庭松影暮天涼送劉友峯再遊南泉手攜數尺緑玉杖口誦青囊一卷經莫向北山尋舊隱夜深猿鶴不堪聽立馬卧龍山下路白雲東去是吾家煩君為寄西風信直到疏籬問菊花陸德陽杭州新居武林城下文章客移得幽居近碧灣聞説梅花開欲遍一舟衝雨到孤山青山隔屋暮雲濕紅日當空春水明月滿六橋歌舞散栁隂深處有書聲草萍驛和薩天錫林外輕風帽影斜客衣近染紫山霞等間點檢春多少牆角薔薇幾樹花蒜嶺道中誰家種稻覆山田何處鐘聲隔暮煙渡口潮深風滿海嶺頭雲盡月當天宿莆陽玄妙觀贈一山道人曽向山房夜聽琴白雲有約許重尋吟成立盡虛簷月落葉滿庭秋意深白晝爐熏裊碧煙小窗清夢快遊仙人間何處無瑤草不信蓬壺别有天送阮洞仙我住桃源六十年神仙不見意茫然如今駐馬壺山下始信城中有洞仙題四皓圖鶴髮蒼顔太古心採芝共入白雲深只因誤到長安寺惹得人間説至今錢舜舉木芙蓉紅粧初映酒杯酣斜倚西風轉不堪霜後池塘秋欲盡令人惆悵憶江南洗長圖千里名駒出渥窪十年汗血染塵沙如今海上都無事楊栁池邊浴五花玄妙觀作樹間宿靄喜初收樹梢晴嵐翠欲流半醉半醒詩未就一夜西風葉葉秋題射獵圖滿目西風塞上塵五花驄馬轉精神憑君莫射雙飛燕恐有音書寄逺人題山水圖漁舟風雨蓑衣冷僧寺煙霏塔影斜行客莫嫌天色暝隔江雞犬有人家舟泊揚州曉發瓜州古渡頭好風半日到揚州客船只向城西泊何處吹簫月滿樓寒山寺古寺蕭條枕碧漪幾人泚筆好題詩客船也有鐘聲到不是姑蘇夜半時題山水卷野徑穿雲入翠微山家茅屋掩柴扉扁舟獨釣滄江上風雨滿船猶未歸題捕魚圖水光不動棹聲遲阿母舟中坐哺兒却笑世途風浪惡人家骨肉苦分離白衣漁父獨操舟兩岸西風蘆荻秋稚子莫驚灘水險險灘過了是安流蒲萄夏半蒲萄正熟時纍纍滿架紫金垂甘酸亦自能消渴可惜相如早不知畫梅枝頭春雪瑩芳樽綽約氷姿襲醉魂翠羽影殘清夢覺滿天霜月正黃昏圭峯集卷上
