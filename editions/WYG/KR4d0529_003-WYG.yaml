body:
  text: 圭峯集附録行實故前村居士盧公墓誌銘前國子生三山吳鑑撰蓋惠安盧琦登至正二年進士第授將士郎台州錄事蹄自京師之五月丁父憂明年七月來福州以善状乞銘於吳鑑曰吾先世光州固始人也唐末避亂從王諸入閩居泉之惠安宋乾逍間有曰曕者隱登髙山下以八行摹邑人名其山曰登科山其後遷邑東之圭峯下乃吾髙祖之父也髙祖諱汝華曾祖諱達叔祖諱義先以至元丙子之三月生吾父名慶龍字雲從其年束六岳亂吾祖偕柤母李氏避之海􅵢中逾年而歸憐里親戚咸劉子兵而吾廬栢然獨遺祖父冒難阻躬劬勩以収役舊業雖倥偬不遑而教子必有禮法敖吾父羈貫知自力學問從槐庭王先生齊芒楊先生遊吾父事親孝居祖母李氏䘮哀毁骨立祖父病侍湯藥食飲衣晝夜不解帶至剔股肉為糜進之祖父殁䘮塟盡禮比老猶孺慕不衰歲時祭祀未嘗不悲思垂涕泣間遇人親䘮亦為之泣蓋深痛二親之不復可見也生平不飲酒惟喜啜茗讀古書為歌詩取適己意客至必治酒且清談窮日夜樂之不為厭州里疏戚咸稱善人人無間於言吾母鄭氏有賢徳先二十七年卒時吾兄弟㓜穉吾父絶甘分少俾得就保傅嘗誨琦等曰汝母早殁吾敎汝兄弟讀書非圖富貴利達惟願世先徳為好人行好事而已及琦歸自京又嘗命琦曰汝承祖宗休澤幸已成進士吾日暮途逺恐不能待汝禄養矣然吾居鄉見世吏以貪傲敗名節人唾猶虫蛆汝惟廉謹守道則吾地下之目瞑矣後數日感微疾端黙而逝時癸未二月十二日也得年六十有八子男四人長嶼次琦次琥次瑛皆已娶女一人適張某孫男五人孫女一人諸孤将以丙戌十二月廿四日丁酉奉柩塟于縣北仙境山之原惟先生知吾父也審敢請銘余曰先大人存善積徳羨有成趾若銜詞不違篤勤為孝子而又登巍科錚然顯聞天下揚光烈信來世宜謁達官聞人銘而君以屬余是其有尚也已余何敢辭銘曰閩海之壖圭峯所蟠有美隱君康盤其間野藝澤漁于以自老孝善世繼委祉子後及見子貴禄奉弗逮凛乎若存有訓有戒仙岡之阡孝思烝烝銘以勸善乆戴是徴盧平陽哀辭三山陳忠予始從亡友余君子賢識盧希韓氏經學該貫下筆無凝滯而為人簡重子賢每語余曰盧生在吾門十餘年不見其有惰容既登進士第居官所至以循廉稱閩中進士如希韓者不多見也晚以近臣薦除守平陽州命下而希韓殁矣後三年其門人陳中立裒其遺文偕其子昺來訪予廬州予嘆曰嗟夫希韓死不可見矣得見其子與其弟子又得見其遺文庸非予之願哉抑希韓之不殁非徒以文辭為也予觀希韓性孝友奉父命從學百里外常惴惴如在親側其在家也温被扇枕侍湯藥而不解帶居䘮不近酒肉不内寢家人皂𨽻皆信之事兄如事其父愛諸弟甚于子鄉閭率相戒以盧君為法初從師子賢君試浙省師道病卒希韓不顧試期與其友陳彦博經營大事以歸迨得禄視師之家如師在時載其弟之官與分廪而食希韓僅少予一歲每别去見必納拜曰是吾師行也嘗記在郡城秋雨連日與對榻彦慱家中夜劇談立已濟人之道希韓奮然誓曰某必不敢負師友卒果如其言蓋其為政有古人風諸公所作碑銘皆實録無愧予目擊其在三山提舉鹺事番大商以貨得叅省政勢振中外有咈意立箠殺之脅户部令奪下四塲引鹽自為市希韓曰是上棄國課下毒亭户及食鹽民皆我所為斷吾腕不署牒人為希韓危希韓曰以是重得禍固所宜竟堅執卧不顧此尤人所難者昔欒子有言曰民生於三惟其所在則致死焉希韓於是蓋兼之矣世之士大夫以斯文名惟務纂組粉澤為干譽取悦之具要其所為與詩書不啻秦越云觀希韓海口祈晴永春喻賊等作言一出口如天人之應如響斯答是果浮華之末所能致哉然以希韓之學行歴官二十年未脱州郡以片言屢弭冦變而不一録切當民窮財匱之秋天不畀之年以究所施以拯斯世而僅止中夀此予所深哀也今其門人之義汲汲然為求斯文於四方惟恐散墜亦可謂幸矣於其再至而歸也敢述此辭洩予之哀俾為告於墓既以痛斯文之澤不得大被於時又幸希韓施未究而見於文辭者猶克傳於後也希韓名琦泉之惠安人宋乾道間舉八行名瞻者其祖也中立字誠中莆田人世號忠門云辭曰猗希韓兮粹美所鍾惇孝友兮實行諸躬隆師篤義兮靡間始終有本如是兮宜流之豐嗟所美兮豈文藻之為工牛刀小試兮屢奏其庸頌聲載路兮何渢渢使天假齡兮騫以沖福我民兮流澤何窮鸞鳯伏海兮羣鶚厲空謂蚊之饒兮孰可養而為龍𤣥雲八表兮尚寐無聰歌以哀之兮夫孰知予之沖沖永春平賊記元奉政大夫同知福州路總管府事致仕林以順撰盧琦字希韓惠安人登至正二年進士第十二年稍遷至永春縣尹始至賑饑饉止横斂均賦役減口鹽一百餘引蠲包銀𣙜鐵之無徴者已而訟息民安乃新學宫延師課子弟月書季考文風翕然鄰邑仙遊盜發琦適巡邑境盜遙見之迎拜曰此永春大夫也為大夫百姓者何幸之大乎吾邑長乃以暴毒驅我故至此爾琦因立馬喻以禍福衆皆投刀槊請縛其首以自新琦許之酋至琦械送帥府自是威惠行於境外十三年泉郡大饑死者相枕藉其能行者皆老㓜扶攜就食永春琦命分諸浮屠及大家使食之所存活不可勝計十四年安溪冦數萬人來襲永春琦聞召邑民喻之曰汝等能戰則與之戰不能我當獨死之爾衆皆感憤曰使君何言使君父母我民赤子其忍以父母畀賊耶彼冦方將擄掠我妻子焚爇我室廬乃一邑深仇也今日之事有進無退使君其勿以為憂因踴躍爭奮琦率以攻賊大破明日復傾巢而至又破之大小三十餘戰斬獲一千二百餘人而邑民無死傷者賊大衂遂遁去時兵革四起列郡皆洶洶不寧獨永春晏然無異承平時十六年改調寧徳縣尹而去恭人陳氏壙志恭人姓陳氏諱懿字孤徽世家惠安之烏石曾祖諱嗣源祖諱旃澤父諱怡孫母許氏以至大己酉八月廿七日生年二十八我先君受於烏石之廟而歸於盧氏先君諱琦自號立齋登元進士第累官至漕司提舉例始封恭人殁時則大明洪武癸丑五月七日也享年六十又五子男四長暹次果次昺次晏長蚤世女三皆殤孫男三源汝魁女六諸孤卜以次年八月廿八日辛酉奉柩葬於龜鼈山之源與平陽君合窆焉尊治命也恭人生而孝敬温惠㓜涉書史有載忠臣烈婦孝子順孫之行未嘗不三復嘆慕既歸奉吾祖南昌君視滫瀡問燠寒唯謹南昌君嘗語人曰自吾得新婦増一孝女南昌君殁脱簪珥以營𦵏事春秋享祀盡禮事平陽君三十年始終賔敬如一日恒銖累黍約以羨周貧乏奉賔客間遇事箴規獻替𢎞多故平陽君所至以循廉稱恭人實有助焉平陽君殁吏民咸致奠賻恭人曰君生而不貨死而貨之非其志也一無所受既葬御績絍課子孫讀書常誨果等曰汝祖遺訓在家乗汝父遺績在國史汝兄弟勿替引之嗚呼恭人已矣尚復聞斯言哉兹逺日有時而孤等未克承紹不敢圖死又不敢請銘於當世君子扳號摧痛昊天罔極敢述卒葬年月以納諸幽云孫果等泣血謹誌莆田陳中填諱立齋盧先生文集後語延平孫伯延公諱琦字希韓號立齋温陵人以詩明經領薦江浙遂魁禮闈登壬午進士第授台州録事予時弱冠始習舉子業每觀公科文未嘗不三復數嘆恨不得拜門下以從授業比公調延平郡幕職前鄉貢進士陳立大薦予於公以教誨其諸子始終三年獲親炙焉公以詩經啓發於予者必盡其藴凡平日所為詩文亦必以示予予見其矩度嚴整而㫖意幽逺近世作者鮮能及之或謂公長於科文而詩文尤工公弗自以為是也至正庚寅秋江浙省禮公較文予忝預選列士大夫咸謂予之得所傳其疑公之私者公則曰師友傳授固欲學者之底於成設有所私焉亦因其可取而取之耳己亥秋福建大比多士公適任鹽司提舉督課於莆不與考試予復預選明年公還署予謁見公笑曰君再捷科場吾嚮者之謗可以白矣壬寅之春予又與同郡尤英舉於鄉公時寓海口聞之喜曰尤英又中矣尤英嘗與子偕學於公者也論者亦信夫公之有所傳矣是年秋七月公以疾終於所寓歸葬惠安于時賽甫丁搆難官軍討之道阻予與尤英不得奔訃㑹葬惟南望抱哀而已歳乙巳二月福建復大比予掌卷簾内公之子昺亦就試場屋主文掲榜得詩經一卷經義頗佳賦䇿尤善以限榜額弗登名逮出院始知其為昺之所作也予既為之悵惜且喜公有子能紹其家學矣公之徒莆陽陳誠中氏適至三山與予學同寓僧舍誠中訪求得公所為詩文而編次之凡十三卷將鋟梓以乆其傳且求諸名公為之序予請而讀之既悲公之早殁不及大用於時使其文不得見之館閣以黼黻皇家之盛治猶幸餘膏賸馥之存使誠中得以掇拾於亂離散失之後以傳之不朽懿矣哉誠中因書此以附於卷後一以明夫公傳授之素一以嘉夫誠中用心之勤以公之子觀之其亦知所勉哉其亦知所慕哉圭峯集附録
